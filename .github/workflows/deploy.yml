name: Deploy launcher to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [app-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build CSS (Tailwind + Konsta)
        run: npm run build

      - name: Install rasterizer
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin imagemagick

      - name: Generate icon PNGs
        run: |
          set -euo pipefail
          mkdir -p launcher/icons
          # Drop-in override: if launcher/icons/custom.png exists, it is used
          # as the source for all iOS/PWA icons instead of rasterizing the SVG.
          # Any square PNG works best (>=512px); non-square is center-cropped.
          if [ -f launcher/icons/custom.png ]; then
            convert launcher/icons/custom.png -resize 180x180^ -gravity center -extent 180x180 launcher/icons/apple-touch-icon.png
            convert launcher/icons/custom.png -resize 512x512^ -gravity center -extent 512x512 launcher/icons/icon-512.png
            convert launcher/icons/custom.png -resize 512x512^ -gravity center -extent 512x512 /tmp/icon-splash.png
          else
            rsvg-convert -w 180 -h 180 launcher/icons/icon.svg -o launcher/icons/apple-touch-icon.png
            rsvg-convert -w 512 -h 512 launcher/icons/icon.svg -o launcher/icons/icon-512.png
            rsvg-convert -w 512 -h 512 launcher/icons/icon.svg -o /tmp/icon-splash.png
          fi
          # iPhone 13 Pro portrait splash: 1170x2532, background + centered icon.
          convert -size 1170x2532 xc:'#faf9f5' \
            \( /tmp/icon-splash.png \) -gravity center -composite \
            launcher/icons/splash-1170x2532.png

      - name: Assemble site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/apps
          cp -R launcher/. _site/
          if [ -d apps ] && [ -n "$(ls -A apps 2>/dev/null | grep -v '^\.gitkeep$' || true)" ]; then
            cp -R apps/. _site/apps/
          fi
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
