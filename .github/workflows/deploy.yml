name: Deploy launcher to Pages

# Deploys production to the gh-pages branch root so that
# https://jackdengler.github.io/central-optimus/ serves the launcher.
#
# Preserves the /preview/ subdirectory so branch previews aren't clobbered
# by a main deploy.
#
# One-time setup: Settings -> Pages -> Source must be
# "Deploy from a branch" with Branch = gh-pages, Folder = /.

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [app-updated]

permissions:
  contents: write

concurrency:
  group: gh-pages-write
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: source/package-lock.json

      - name: Install deps
        working-directory: source
        run: npm ci

      - name: Build CSS (Tailwind + Konsta)
        working-directory: source
        run: npm run build

      - name: Install rasterizer
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin imagemagick

      - name: Generate icon PNGs
        working-directory: source
        run: |
          set -euo pipefail
          mkdir -p launcher/icons
          # Drop-in override: if launcher/icons/custom.png exists, it is used
          # as the source for all iOS/PWA icons instead of rasterizing the SVG.
          # Any square PNG works best (>=512px); non-square is center-cropped.
          if [ -f launcher/icons/custom.png ]; then
            convert launcher/icons/custom.png -resize 180x180^ -gravity center -extent 180x180 launcher/icons/apple-touch-icon.png
            convert launcher/icons/custom.png -resize 512x512^ -gravity center -extent 512x512 launcher/icons/icon-512.png
            convert launcher/icons/custom.png -resize 512x512^ -gravity center -extent 512x512 /tmp/icon-splash.png
          else
            rsvg-convert -w 180 -h 180 launcher/icons/icon.svg -o launcher/icons/apple-touch-icon.png
            rsvg-convert -w 512 -h 512 launcher/icons/icon.svg -o launcher/icons/icon-512.png
            rsvg-convert -w 512 -h 512 launcher/icons/icon.svg -o /tmp/icon-splash.png
          fi
          # iPhone 13 Pro portrait splash: 1170x2532, background + centered icon.
          convert -size 1170x2532 xc:'#faf9f5' \
            \( /tmp/icon-splash.png \) -gravity center -composite \
            launcher/icons/splash-1170x2532.png

      - name: Assemble _site
        working-directory: source
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/apps
          cp -R launcher/. _site/
          if [ -d apps ] && [ -n "$(ls -A apps 2>/dev/null | grep -v '^\.gitkeep$' || true)" ]; then
            cp -R apps/. _site/apps/
          fi
          touch _site/.nojekyll

      - name: Publish _site to gh-pages:/ (preserving /preview/)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          PAGES_DIR=$(mktemp -d)
          CLONE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git"

          if git ls-remote --heads "$CLONE_URL" gh-pages | grep -q gh-pages; then
            git clone --branch gh-pages --depth 1 "$CLONE_URL" "$PAGES_DIR"
          else
            git clone --depth 1 "$CLONE_URL" "$PAGES_DIR"
            (cd "$PAGES_DIR" && git checkout --orphan gh-pages && git rm -rf . >/dev/null 2>&1 || true)
          fi

          # Preserve existing /preview/ directory (branch previews)
          SAVED_PREVIEW=""
          if [ -d "$PAGES_DIR/preview" ]; then
            SAVED_PREVIEW=$(mktemp -d)
            cp -R "$PAGES_DIR/preview/." "$SAVED_PREVIEW/"
          fi

          # Wipe root and replace with fresh _site (keep .git)
          find "$PAGES_DIR" -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R source/_site/. "$PAGES_DIR/"

          # Restore /preview/ on top of the new root
          if [ -n "$SAVED_PREVIEW" ]; then
            mkdir -p "$PAGES_DIR/preview"
            cp -R "$SAVED_PREVIEW/." "$PAGES_DIR/preview/"
          fi

          cd "$PAGES_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No production changes to publish"
            exit 0
          fi
          git commit -m "deploy: main @ ${SHA:0:7}"
          git push origin gh-pages
