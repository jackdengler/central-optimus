name: Build preview artifact

# Builds the launcher + previews/ on any non-main branch push and uploads
# the result as a downloadable Actions artifact (zip). Does NOT deploy to
# Pages, so production at jackdengler.github.io/central-optimus/ is unaffected.

on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build CSS (Tailwind + Konsta)
        run: npm run build

      - name: Assemble preview bundle
        run: |
          set -euo pipefail
          rm -rf _preview
          mkdir -p _preview
          cp -R launcher/. _preview/
          if [ -d previews ]; then
            mkdir -p _preview/previews
            cp -R previews/. _preview/previews/
          fi
          # Helpful entry point so opening index.html at the root has somewhere to land
          cat > _preview/_PREVIEW_README.txt <<'EOF'
          Open one of:
            - launcher/   (the real launcher; pinned dialog will appear)
            - previews/spinning-globe.html  (standalone globe preview)

          Tip: serve the folder, e.g.
            python3 -m http.server 8000
          then visit http://localhost:8000/previews/spinning-globe.html
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # Branch refs may contain "/", which upload-artifact rejects, so use SHA only.
          name: launcher-preview-${{ github.sha }}
          path: _preview
          if-no-files-found: error
          retention-days: 14
