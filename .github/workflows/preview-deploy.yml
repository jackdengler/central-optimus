name: Deploy branch preview

# Deploys the current branch's launcher + previews to the gh-pages branch
# under /preview/<branch-slug>/ so it's served at
# https://jackdengler.github.io/central-optimus/preview/<branch-slug>/
#
# Requires (one-time) Settings -> Pages -> Source = "Deploy from a branch"
# with Branch = gh-pages and Folder = /. Until that switch happens, this
# workflow still runs and populates gh-pages, but nothing is served
# publicly.

on:
  push:
    branches-ignore: [main, gh-pages]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-write
  cancel-in-progress: false

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: source/package-lock.json

      - name: Install deps + build CSS
        working-directory: source
        run: |
          npm ci
          npm run build

      - name: Compute branch slug
        id: slug
        run: |
          SLUG=$(echo "${GITHUB_REF_NAME}" | tr '/ ' '--' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "Preview slug: $SLUG"

      - name: Assemble preview bundle
        working-directory: source
        run: |
          set -euo pipefail
          rm -rf _preview
          mkdir -p _preview
          # Full launcher (same content as production) so /preview/<slug>/launcher/ works
          cp -R launcher/. _preview/
          # Standalone previews (iteration files)
          if [ -d previews ]; then
            mkdir -p _preview/previews
            cp -R previews/. _preview/previews/
          fi
          touch _preview/.nojekyll

      - name: Publish to gh-pages:/preview/<slug>/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ steps.slug.outputs.slug }}
          GH_REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          PAGES_DIR=$(mktemp -d)
          CLONE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git"

          if git ls-remote --heads "$CLONE_URL" gh-pages | grep -q gh-pages; then
            git clone --branch gh-pages --depth 1 "$CLONE_URL" "$PAGES_DIR"
          else
            echo "gh-pages branch doesn't exist yet; creating orphan branch"
            git clone --depth 1 "$CLONE_URL" "$PAGES_DIR"
            (cd "$PAGES_DIR" && git checkout --orphan gh-pages && git rm -rf . >/dev/null 2>&1 || true)
            # Seed a minimal index so the root URL doesn't 404 before main is redeployed
            cat > "$PAGES_DIR/index.html" <<'EOF'
          <!doctype html><meta charset="utf-8"><title>central-optimus</title>
          <body style="font-family:system-ui;padding:2rem;max-width:40rem;margin:auto;color:#1f1b16;background:#f6f1e7;">
          <h1>central-optimus</h1>
          <p>This is the gh-pages root. Production launcher will land here once
          the refactored main deploy workflow runs. Branch previews are under
          <code>/preview/&lt;branch-slug&gt;/</code>.</p>
          </body>
          EOF
            touch "$PAGES_DIR/.nojekyll"
          fi

          DEST="$PAGES_DIR/preview/$SLUG"
          rm -rf "$DEST"
          mkdir -p "$DEST"
          cp -R source/_preview/. "$DEST/"

          cd "$PAGES_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish for $SLUG"
            exit 0
          fi
          git commit -m "preview($SLUG): $REF_NAME @ ${SHA:0:7}"
          git push origin gh-pages
          echo ""
          echo "Preview will be available at:"
          echo "  https://${GH_REPO%/*}.github.io/${GH_REPO#*/}/preview/$SLUG/"
          echo "  (once Settings -> Pages -> Source is set to: Deploy from branch 'gh-pages' / (root))"
