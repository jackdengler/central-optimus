<!doctype html>
<html lang="en" class="ios">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f6f1e7" />
    <title>Central Optimus</title>

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Optimus" />
    <!-- Pre-paint the cream on html so the iOS PWA home-indicator safe
         area is filled before the linked stylesheet lands. -->
    <style>
      html, body { margin: 0; }
      html { background-color: #f6f1e7; }

      /* ------------------------------------------------------------------
         FIRST-LAUNCH SPLASH
         Inline + critical so it paints on the very first frame, before
         styles.css / app.js / the 130 KB watch mechanism have loaded.
         Shows the app icon with a gentle breathe + an indeterminate
         progress sweep, then crossfades out the moment the real UI is
         ready (see the dismiss script at the end of <body>). Self-
         contained: no dependency on app.js. */
      #co-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background:
          radial-gradient(32rem 26rem at 50% 36%, rgba(201, 106, 71, 0.10), transparent 70%),
          #f6f1e7;
        padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
        -webkit-tap-highlight-color: transparent;
        transition: opacity 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      #co-splash.is-hidden { opacity: 0; pointer-events: none; }
      #co-splash .co-splash-badge {
        width: 104px;
        height: 104px;
        border-radius: 24px;
        overflow: hidden;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.6),
          0 18px 40px -12px rgba(60, 46, 30, 0.45),
          0 4px 12px -4px rgba(60, 46, 30, 0.30);
        animation:
          co-splash-pop 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both,
          co-splash-breathe 3.2s ease-in-out 0.6s infinite;
      }
      #co-splash .co-splash-badge svg { display: block; width: 100%; height: 100%; }
      #co-splash .co-splash-word {
        font: 600 14px/1 -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", Roboto, system-ui, sans-serif;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #8a7f6c;
        opacity: 0;
        animation: co-splash-fade 0.6s ease 0.25s both;
      }
      #co-splash .co-splash-track {
        width: 116px;
        height: 3px;
        border-radius: 3px;
        overflow: hidden;
        background: rgba(60, 46, 30, 0.12);
        opacity: 0;
        animation: co-splash-fade 0.6s ease 0.35s both;
      }
      #co-splash .co-splash-bar {
        display: block;
        width: 42%;
        height: 100%;
        border-radius: 3px;
        background: linear-gradient(90deg, #c96a47, #a44f30);
        animation: co-splash-slide 1.25s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }
      @keyframes co-splash-pop {
        from { opacity: 0; transform: scale(0.92); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes co-splash-breathe {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.035); }
      }
      @keyframes co-splash-fade {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes co-splash-slide {
        0%   { transform: translateX(-120%); }
        100% { transform: translateX(380%); }
      }
      @media (prefers-reduced-motion: reduce) {
        #co-splash .co-splash-badge { animation: none; }
        #co-splash .co-splash-bar { animation: none; width: 100%; }
        #co-splash .co-splash-word,
        #co-splash .co-splash-track { animation: none; opacity: 1; }
      }
    </style>

    <link
      rel="apple-touch-startup-image"
      href="./icons/splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- First-launch splash. Inline icon (same artwork as icons/icon.svg)
         so it paints instantly with zero network. role=presentation +
         aria-hidden keep it out of the a11y tree; the dismiss script at the
         end of <body> crossfades it away the moment the app is ready. -->
    <div id="co-splash" role="presentation" aria-hidden="true">
      <div class="co-splash-badge">
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="sp-plate" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#f3ead8"/>
              <stop offset="0.55" stop-color="#ece3d0"/>
              <stop offset="1" stop-color="#ddd1b9"/>
            </linearGradient>
            <radialGradient id="sp-shadow" cx="50%" cy="50%" r="50%">
              <stop offset="0" stop-color="#2a251f" stop-opacity="0.30"/>
              <stop offset="0.7" stop-color="#2a251f" stop-opacity="0.14"/>
              <stop offset="1" stop-color="#2a251f" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="sp-gear" cx="42%" cy="34%" r="80%">
              <stop offset="0" stop-color="#8c8278"/>
              <stop offset="1" stop-color="#6a6158"/>
            </radialGradient>
            <radialGradient id="sp-orange" cx="40%" cy="32%" r="82%">
              <stop offset="0" stop-color="#e0966a"/>
              <stop offset="1" stop-color="#c87b4f"/>
            </radialGradient>
            <radialGradient id="sp-cream" cx="42%" cy="34%" r="80%">
              <stop offset="0" stop-color="#f3ecdc"/>
              <stop offset="1" stop-color="#e6ddca"/>
            </radialGradient>
          </defs>
          <rect x="0" y="0" width="512" height="512" fill="url(#sp-plate)"/>
          <ellipse cx="256" cy="272" rx="206" ry="200" fill="url(#sp-shadow)"/>
          <g fill="#3a342d">
            <rect x="206" y="56" width="100" height="86" rx="32"/>
            <rect x="206" y="56" width="100" height="86" rx="32" transform="rotate(45 256 256)"/>
            <rect x="206" y="56" width="100" height="86" rx="32" transform="rotate(90 256 256)"/>
            <rect x="206" y="56" width="100" height="86" rx="32" transform="rotate(135 256 256)"/>
            <rect x="206" y="56" width="100" height="86" rx="32" transform="rotate(180 256 256)"/>
            <rect x="206" y="56" width="100" height="86" rx="32" transform="rotate(225 256 256)"/>
            <rect x="206" y="56" width="100" height="86" rx="32" transform="rotate(270 256 256)"/>
            <rect x="206" y="56" width="100" height="86" rx="32" transform="rotate(315 256 256)"/>
            <circle cx="256" cy="256" r="156"/>
          </g>
          <g fill="url(#sp-gear)">
            <rect x="216" y="66" width="80" height="66" rx="22"/>
            <rect x="216" y="66" width="80" height="66" rx="22" transform="rotate(45 256 256)"/>
            <rect x="216" y="66" width="80" height="66" rx="22" transform="rotate(90 256 256)"/>
            <rect x="216" y="66" width="80" height="66" rx="22" transform="rotate(135 256 256)"/>
            <rect x="216" y="66" width="80" height="66" rx="22" transform="rotate(180 256 256)"/>
            <rect x="216" y="66" width="80" height="66" rx="22" transform="rotate(225 256 256)"/>
            <rect x="216" y="66" width="80" height="66" rx="22" transform="rotate(270 256 256)"/>
            <rect x="216" y="66" width="80" height="66" rx="22" transform="rotate(315 256 256)"/>
            <circle cx="256" cy="256" r="146"/>
          </g>
          <circle cx="256" cy="256" r="116" fill="#3a342d"/>
          <circle cx="256" cy="256" r="106" fill="url(#sp-cream)"/>
          <circle cx="256" cy="256" r="82"  fill="#3a342d"/>
          <circle cx="256" cy="256" r="74"  fill="url(#sp-orange)"/>
          <circle cx="256" cy="256" r="14"  fill="#3a342d"/>
          <g fill="url(#sp-cream)" stroke="#3a342d" stroke-width="7">
            <rect x="240" y="146" width="32" height="50" rx="12"/>
            <rect x="240" y="146" width="32" height="50" rx="12" transform="rotate(90 256 256)"/>
            <rect x="240" y="146" width="32" height="50" rx="12" transform="rotate(180 256 256)"/>
            <rect x="240" y="146" width="32" height="50" rx="12" transform="rotate(270 256 256)"/>
          </g>
        </svg>
      </div>
      <div class="co-splash-word">Central Optimus</div>
      <div class="co-splash-track"><span class="co-splash-bar"></span></div>
    </div>

    <a class="skip-link" href="#launcher-grid">Skip to apps</a>
    <!--
      Launcher home screen. The page is a 3D flip-card:
        • front — watch movement (<canvas.watch-canvas>) + shell (#app)
        • back  — the embedded app (#embed, injected by app.js)
      Boot sequence zooms the watch camera from 'wide' (full watch framed)
      in to 'ambient' (plate fills viewport). Tapping a tile reverses
      that — pull back to 'wide' — then flips the card 180° so the back
      face (app) swings into view. Closing flips back and zooms in.
    -->
    <svg class="bg-noise" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <filter id="paperGrain">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
        <feColorMatrix type="matrix"
          values="0 0 0 0 0.12
                  0 0 0 0 0.10
                  0 0 0 0 0.08
                  0 0 0 0.55 0"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#paperGrain)"/>
    </svg>

    <div class="flip-scene">
      <div class="flip-card" id="flip-card">
        <div class="flip-face flip-front">
          <canvas class="watch-canvas" aria-hidden="true"></canvas>
          <main id="app" class="shell is-booting" hidden>
      <!-- Greeting + meta row -->
      <div class="greeting">
        <p class="hello">
          <span id="greet-time">Good morning,</span>
          <span class="name" id="greet-name">Jack</span>
        </p>
        <div class="meta">
          <span id="today-date">—</span>
          <span class="sep"></span>
          <span class="time" id="live-time">—</span>
          <span class="sep"></span>
          <span>Los Angeles</span>
          <span class="sep"></span>
          <span class="weather" id="hero-weather" hidden></span>
        </div>
        <button
          id="lock"
          type="button"
          aria-label="Lock background"
          title="Lock background"
          aria-pressed="false"
          class="lock-btn"
          data-state="unlocked"
        >
          <svg class="lock-glyph lock-glyph-unlocked" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="11" width="16" height="10" rx="2.5" />
            <path d="M8 11V7a4 4 0 0 1 7.5-2" />
          </svg>
          <svg class="lock-glyph lock-glyph-locked" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="11" width="16" height="10" rx="2.5" />
            <path d="M8 11V8a4 4 0 0 1 8 0v3" />
          </svg>
        </button>
      </div>

      <!--
        APP ICON GRID (7 icons) — two-tone object system:
          - 28×28 viewBox, glyph content on a ~24×24 optical grid
          - outer stroke 1.3, interior stroke 1.0, ink (currentColor)
          - each tile carries an inline `--tile-accent` matching its
            app's color in apps.json; SVG fills reference that var so
            the glyph reads as a small object in the app's hue rather
            than a generic monoline symbol
          - cream wells (apertures, edge notches) use --surface-hi
          - 4×2 grid, 7 apps = partial 2nd row LEFT-ANCHORED
            (matches iOS home-screen behavior — do NOT center the 7th)

        Tile taps are wired in app.js via data-app → apps.json id.
      -->
      <div class="grid" id="launcher-grid" tabindex="-1">

        <!-- 1. MOVIES — film camera with spinning reels (wine red).
             Reels are drawn first so the body covers their bottom 0.5
             units, reading as "housed in the camera." Reels rotate
             continuously at slightly mismatched speeds (4s vs 5.2s)
             for a mechanical feel. -->
        <button type="button" class="icon" aria-label="Movies" data-slot="movies" data-app="upcoming-movies"
           style="--tile-accent: #a32929;">
          <div class="tile">
            <svg viewBox="0 0 28 28" fill="none" stroke="currentColor"
                 stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
              <g class="ico-cam-reel-l">
                <circle cx="9" cy="8" r="3.5" fill="var(--tile-accent)" fill-opacity="0.78"/>
                <circle cx="9" cy="8" r="0.9" fill="currentColor" stroke="none"/>
                <line x1="9"   y1="5"   x2="9"   y2="11"  stroke-width="0.7"/>
                <line x1="6"   y1="8"   x2="12"  y2="8"   stroke-width="0.7"/>
                <line x1="6.9" y1="5.9" x2="11.1" y2="10.1" stroke-width="0.7"/>
                <line x1="11.1" y1="5.9" x2="6.9" y2="10.1" stroke-width="0.7"/>
              </g>
              <g class="ico-cam-reel-r">
                <circle cx="18" cy="8" r="3.5" fill="var(--tile-accent)" fill-opacity="0.78"/>
                <circle cx="18" cy="8" r="0.9" fill="currentColor" stroke="none"/>
                <line x1="18"   y1="5"   x2="18"   y2="11"  stroke-width="0.7"/>
                <line x1="15"   y1="8"   x2="21"   y2="8"   stroke-width="0.7"/>
                <line x1="15.9" y1="5.9" x2="20.1" y2="10.1" stroke-width="0.7"/>
                <line x1="20.1" y1="5.9" x2="15.9" y2="10.1" stroke-width="0.7"/>
              </g>
              <!-- camera body (covers reel bottoms) -->
              <rect x="3" y="11" width="19" height="11" rx="1.6"
                    fill="var(--tile-accent)" fill-opacity="0.85"/>
              <!-- lens barrel -->
              <rect x="22" y="14" width="4" height="5" rx="0.6"
                    fill="var(--tile-accent)" fill-opacity="0.85"/>
              <!-- lens glass -->
              <circle cx="24" cy="16.5" r="1.1" fill="var(--surface-hi)" stroke-width="0.8"/>
              <!-- record indicator -->
              <circle cx="6.2" cy="19.2" r="0.8" fill="var(--surface-hi)" stroke="none"/>
            </svg>
          </div>
        </button>

        <!-- 2. BETTING — poker chip face-on (terracotta) -->
        <button type="button" class="icon" aria-label="Betting" data-slot="betting" data-app="parlay"
           style="--tile-accent: #d97757;">
          <div class="tile">
            <svg viewBox="0 0 28 28" fill="none" stroke="currentColor"
                 stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="14" cy="14" r="10" fill="var(--tile-accent)" fill-opacity="0.82"/>
              <rect x="13.1" y="3.5"  width="1.8" height="3"   fill="var(--surface-hi)" stroke="none"/>
              <rect x="13.1" y="21.5" width="1.8" height="3"   fill="var(--surface-hi)" stroke="none"/>
              <rect x="3.5"  y="13.1" width="3"   height="1.8" fill="var(--surface-hi)" stroke="none"/>
              <rect x="21.5" y="13.1" width="3"   height="1.8" fill="var(--surface-hi)" stroke="none"/>
              <circle cx="14" cy="14" r="6.2" stroke-width="1.0"/>
              <path class="ico-chip-diamond"
                    d="M 14 10.8 L 16.6 14 L 14 17.2 L 11.4 14 Z"
                    fill="currentColor" stroke="none"/>
            </svg>
          </div>
        </button>

        <!-- 3. MONEY — twin overlapping coins (green) -->
        <button type="button" class="icon" aria-label="Money" data-slot="money" data-app="budget-together"
           style="--tile-accent: #4a7c59;">
          <div class="tile">
            <svg viewBox="0 0 28 28" fill="none" stroke="currentColor"
                 stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="10.5" cy="10.5" r="6.8" fill="var(--tile-accent)" fill-opacity="0.55"/>
              <g class="ico-coin-front">
                <circle cx="17" cy="17" r="7.5" fill="var(--tile-accent)" fill-opacity="0.92"/>
                <circle cx="17" cy="17" r="5.6" stroke-width="1.0"/>
                <text x="17" y="20.1" text-anchor="middle"
                      fill="currentColor" stroke="none"
                      font-family="-apple-system, 'SF Pro Text', sans-serif"
                      font-size="9" font-weight="700"
                      style="letter-spacing: -0.04em;">$</text>
              </g>
            </svg>
          </div>
        </button>

        <!-- 4. UFC — boxing glove (blue) -->
        <button type="button" class="icon" aria-label="UFC" data-slot="ufc" data-app="cornerman"
           style="--tile-accent: #2b6cb0;">
          <div class="tile">
            <svg viewBox="0 0 28 28" fill="none" stroke="currentColor"
                 stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
              <g class="ico-glove">
                <!-- thumb fill (closed, no stroke so the seam back to the body
                     doesn't draw a visible line through the cuff) -->
                <path d="M 21 12.5
                         C 22.6 12.5 23.2 13.5 23.2 14.5
                         C 23.2 15.5 22.6 16.5 21 16.5
                         L 21 12.5 Z"
                      fill="var(--tile-accent)" fill-opacity="0.82" stroke="none"/>
                <!-- thumb outline (open curve only) -->
                <path d="M 21 12.5
                         C 22.6 12.5 23.2 13.5 23.2 14.5
                         C 23.2 15.5 22.6 16.5 21 16.5"/>
                <!-- glove body: fill + inherited stroke in one path -->
                <path d="M 6.5 11
                         C 6.5 7.5 9 5.5 13 5.5
                         C 18 5.5 21 8 21 12.5
                         C 21 14.5 20 15.5 19 16
                         L 19 19.5
                         C 19 21 18 22.5 16 22.5
                         L 9.5 22.5
                         C 7.5 22.5 6.5 21 6.5 19.5
                         Z"
                      fill="var(--tile-accent)" fill-opacity="0.82"/>
                <line x1="6.5" y1="19.5" x2="19" y2="19.5" stroke-width="1.0"/>
                <path d="M 9 9.5 C 11.5 11 16 11 18.5 9.5" stroke-width="1.0"/>
                <path d="M 11 13.5 L 13 14.5 M 13 12.8 L 15.2 14
                         M 11 16   L 13 17   M 13 15.3 L 15.2 16.5"
                      stroke-width="1.0"/>
              </g>
            </svg>
          </div>
        </button>

        <!-- 5. CHORES — broom that gently sweeps; cleaned-side sparkle
             pulses when the broom finishes its leftward swing (indigo) -->
        <button type="button" class="icon" aria-label="Chores" data-slot="chores" data-app="polished-space"
           style="--tile-accent: #312e81;">
          <div class="tile">
            <svg viewBox="0 0 28 28" fill="none" stroke="currentColor"
                 stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
              <g class="ico-broom">
                <!-- handle -->
                <line x1="14" y1="4" x2="14" y2="16" stroke-width="1.7"/>
                <!-- bristle joint band -->
                <rect x="9.5" y="15" width="9" height="2.5" rx="0.5"
                      fill="var(--tile-accent)" fill-opacity="0.9"/>
                <!-- bristle fan -->
                <path d="M 10 17.5 L 7 24 L 21 24 L 18 17.5 Z"
                      fill="var(--tile-accent)" fill-opacity="0.78"/>
                <!-- bristle striations -->
                <line x1="11"   y1="18.2" x2="9.5"  y2="23.5" stroke-width="0.7"/>
                <line x1="13"   y1="18.2" x2="12.5" y2="23.5" stroke-width="0.7"/>
                <line x1="15"   y1="18.2" x2="15.5" y2="23.5" stroke-width="0.7"/>
                <line x1="17"   y1="18.2" x2="18.5" y2="23.5" stroke-width="0.7"/>
              </g>
              <!-- "swept clean" sparkle, opposite the swing -->
              <path class="ico-broom-spark"
                    d="M 24 20 L 26 20 M 25 19 L 25 21" stroke-width="1.0"/>
            </svg>
          </div>
        </button>

        <!-- 6. CLEAN SCRIPT — bound screenplay pages (teal) -->
        <button type="button" class="icon" aria-label="Clean Script" data-slot="script" data-app="clean-script"
           style="--tile-accent: #0f766e;">
          <div class="tile">
            <svg viewBox="0 0 28 28" fill="none" stroke="currentColor"
                 stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 9 5 L 22 5 L 22 22 L 9 22 Z"
                    fill="var(--tile-accent)" fill-opacity="0.32" stroke="currentColor" stroke-width="1.0"/>
              <path d="M 6 4 L 19 4 L 19 24 L 6 24 Z"
                    fill="var(--tile-accent)" fill-opacity="0.85"/>
              <circle cx="6" cy="9"  r="1.1" fill="currentColor" stroke="none"/>
              <circle cx="6" cy="15" r="1.1" fill="currentColor" stroke="none"/>
              <line x1="9" y1="9"  x2="16.5" y2="9"  stroke-width="1.0"/>
              <line x1="9" y1="12" x2="16"   y2="12" stroke-width="1.0"/>
              <line x1="9" y1="15" x2="14"   y2="15" stroke-width="1.0"/>
              <line x1="9" y1="18" x2="16.5" y2="18" stroke-width="1.0"/>
              <line class="ico-script-cursor"
                    x1="9" y1="21" x2="13" y2="21" stroke-width="1.0"/>
            </svg>
          </div>
        </button>

      </div>

      <!-- Flexible spacer — lets the mechanism breathe between icons and footer -->
      <div class="spacer" aria-hidden="true"></div>

      <!-- Version / publish stamp -->
      <div class="base">
        <div class="version">
          v1.0 &nbsp;·&nbsp;
          <span id="publish-time">published —</span>
        </div>
      </div>
    </main>
        </div><!-- /.flip-front -->
        <div class="flip-face flip-back" id="flip-back" aria-hidden="true"></div>
      </div><!-- /.flip-card -->
    </div><!-- /.flip-scene -->

    <!-- PAT auth gate -->
    <dialog
      id="gate"
      class="co-dialog w-[min(calc(100%-2rem),20rem)] rounded-2xl p-6"
    >
      <form method="dialog" id="gate-form">
        <h2 class="mb-3 text-lg font-semibold tracking-tight">Sign in</h2>
        <p class="mb-3 text-sm leading-snug text-optimus-muted">
          Paste a GitHub personal access token for your account.
          <a
            class="text-optimus-accent font-medium underline-offset-2 hover:underline"
            href="https://github.com/settings/personal-access-tokens/new"
            target="_blank"
            rel="noopener"
            >Create one</a
          >
          (fine-grained, no permissions required).
        </p>
        <input
          id="token"
          type="password"
          autocomplete="off"
          spellcheck="false"
          autofocus
          required
          placeholder="github_pat_..."
          class="mb-3 w-full rounded-xl border border-optimus-border bg-optimus-surface px-4 py-3 text-base text-optimus-text placeholder-optimus-muted focus:outline-none focus:ring-2 focus:ring-optimus-accent/60"
        />
        <p id="gate-error" class="mb-3 text-sm text-red-600" hidden>Sign-in failed.</p>
        <button type="submit" class="btn-primary">Unlock</button>
      </form>
    </dialog>

    <!-- Dismiss the first-launch splash the moment the real UI is ready.
         Decoupled from app.js: triggers on the earliest of — the sign-in
         dialog opening, the shell un-hiding, window load, or a 6s safety
         cap — with a small minimum on-screen time so it never just flashes. -->
    <script>
      (function () {
        var splash = document.getElementById("co-splash");
        if (!splash) return;
        var shownAt = Date.now();
        var MIN_MS = 450;
        var done = false;
        function dismiss() {
          if (done) return;
          done = true;
          var wait = Math.max(0, MIN_MS - (Date.now() - shownAt));
          setTimeout(function () {
            splash.classList.add("is-hidden");
            var remove = function () {
              if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
            };
            splash.addEventListener("transitionend", remove, { once: true });
            setTimeout(remove, 700); // fallback if transitionend doesn't fire
          }, wait);
        }
        // Authed path: the shell un-hides when boot reveals it.
        var app = document.getElementById("app");
        if (app && "MutationObserver" in window) {
          var appObs = new MutationObserver(function () {
            if (!app.hasAttribute("hidden")) {
              appObs.disconnect();
              dismiss();
            }
          });
          appObs.observe(app, { attributes: true, attributeFilter: ["hidden"] });
        }
        // First-run path: get out of the way as the sign-in dialog appears.
        var gate = document.getElementById("gate");
        if (gate && "MutationObserver" in window) {
          var gateObs = new MutationObserver(function () {
            if (gate.open) {
              gateObs.disconnect();
              dismiss();
            }
          });
          gateObs.observe(gate, { attributes: true, attributeFilter: ["open"] });
        }
        document.addEventListener("co:ready", dismiss);
        window.addEventListener("load", dismiss);
        setTimeout(dismiss, 6000); // hard safety cap — never get stuck
      })();
    </script>

    <script type="module" src="./app.js"></script>
  </body>
</html>
