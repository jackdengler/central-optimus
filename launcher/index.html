<!doctype html>
<html lang="en" class="dark ios">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d12" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5f6f8" media="(prefers-color-scheme: light)" />
    <title>Central Optimus</title>

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Optimus" />

    <link
      rel="apple-touch-startup-image"
      href="./icons/splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-optimus-bg text-gray-100">
    <main
      id="app"
      class="mx-auto max-w-5xl px-4 pb-12 k-safe-area-top"
      style="padding-top: max(env(safe-area-inset-top), 1.5rem);"
      hidden
    >
      <header class="mb-8 flex items-center justify-between">
        <h1 id="title" class="m-0 text-2xl font-semibold tracking-tight">Central Optimus</h1>
        <button
          id="lock"
          type="button"
          aria-label="Lock"
          class="rounded-full border border-optimus-surface-2 bg-transparent px-4 py-2 text-sm text-gray-400 transition hover:border-optimus-accent hover:text-gray-100"
        >
          Lock
        </button>
      </header>

      <section
        id="grid"
        aria-label="Apps"
        class="grid gap-4"
        style="grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));"
      ></section>

      <p id="empty" class="mt-20 text-center text-gray-400" hidden>No apps registered yet.</p>
    </main>

    <dialog
      id="gate"
      class="w-[min(calc(100%-2rem),20rem)] rounded-2xl border border-optimus-surface-2 bg-optimus-surface p-6 text-gray-100 shadow-2xl backdrop:bg-black/70 backdrop:backdrop-blur"
    >
      <form method="dialog" id="gate-form">
        <h2 class="mb-3 text-lg font-semibold">Sign in</h2>
        <p class="mb-3 text-sm leading-snug text-gray-400">
          Paste a GitHub personal access token for your account.
          <a
            class="text-optimus-accent"
            href="https://github.com/settings/personal-access-tokens/new"
            target="_blank"
            rel="noopener"
            >Create one</a
          >
          (fine-grained, no permissions required).
        </p>
        <input
          id="token"
          type="password"
          autocomplete="off"
          spellcheck="false"
          autofocus
          required
          placeholder="github_pat_..."
          class="mb-3 w-full rounded-xl border border-optimus-surface-2 bg-optimus-bg px-4 py-3 text-base text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-optimus-accent"
        />
        <p id="gate-error" class="mb-3 text-sm text-red-400" hidden>Sign-in failed.</p>
        <button
          type="submit"
          class="w-full rounded-xl border-0 py-3 text-base font-semibold text-white"
          style="background: linear-gradient(180deg, #7c9cff, #4f46e5);"
        >
          Unlock
        </button>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
