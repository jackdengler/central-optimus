<!doctype html>
<html lang="en" class="ios">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1B1235" />
    <title>Central Optimus</title>

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Optimus" />
    <style>
      html, body { background: #1B1235; margin: 0; }
    </style>

    <link
      rel="apple-touch-startup-image"
      href="./icons/splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="text-optimus-text">
    <div
      id="city-root"
      style="position: fixed; inset: 0; z-index: 0;"
    ></div>

    <main
      id="app"
      class="relative mx-auto max-w-5xl px-4 pb-12"
      style="padding-top: max(env(safe-area-inset-top), 1.5rem); z-index: 10;"
      hidden
    >
      <header id="app-header" class="mb-10 flex items-center justify-between" hidden>
        <h1 id="title" class="m-0 text-3xl font-semibold tracking-tight bg-gradient-to-br from-optimus-text to-optimus-accent-2 bg-clip-text text-transparent">Central Optimus</h1>
        <button
          id="lock"
          type="button"
          aria-label="Lock"
          class="rounded-full border border-optimus-border bg-white/60 px-4 py-2 text-sm text-optimus-muted backdrop-blur transition hover:border-optimus-accent hover:text-optimus-text"
        >
          Lock
        </button>
      </header>

      <section
        id="grid"
        aria-label="Apps"
        class="grid gap-4 sm:gap-5"
        style="grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));"
        hidden
      ></section>
      <p id="empty" class="mt-20 text-center text-optimus-muted" hidden>No apps registered yet.</p>
    </main>

    <dialog
      id="settings"
      class="w-[min(calc(100%-2rem),22rem)] rounded-2xl border border-white/10 bg-[#1B1235] p-6 text-white shadow-2xl backdrop:bg-black/50 backdrop:backdrop-blur"
    >
      <form method="dialog" class="flex flex-col gap-4">
        <h2 class="text-lg font-semibold">Settings</h2>
        <fieldset class="flex flex-col gap-2">
          <legend class="text-sm text-white/70 mb-1">Layout</legend>
          <label class="flex items-center gap-3 rounded-xl border border-white/15 bg-white/5 px-3 py-2 cursor-pointer">
            <input type="radio" name="layout" value="balloons" class="accent-white" />
            <span>Balloons</span>
          </label>
          <label class="flex items-center gap-3 rounded-xl border border-white/15 bg-white/5 px-3 py-2 cursor-pointer">
            <input type="radio" name="layout" value="grid" class="accent-white" />
            <span>Grid</span>
          </label>
        </fieldset>
        <button
          id="settings-lock"
          type="button"
          class="w-full rounded-xl border border-white/20 bg-white/10 py-3 text-sm font-medium text-white hover:bg-white/15"
        >
          Lock &amp; sign out
        </button>
        <button
          id="settings-close"
          type="submit"
          class="w-full rounded-xl border-0 py-3 text-base font-semibold text-white"
          style="background: linear-gradient(180deg, #d97757, #b85a3d);"
        >
          Done
        </button>
      </form>
    </dialog>

    <dialog
      id="gate"
      class="w-[min(calc(100%-2rem),20rem)] rounded-2xl border border-optimus-border bg-optimus-surface p-6 text-optimus-text shadow-xl backdrop:bg-black/40 backdrop:backdrop-blur"
    >
      <form method="dialog" id="gate-form">
        <h2 class="mb-3 text-lg font-semibold">Sign in</h2>
        <p class="mb-3 text-sm leading-snug text-optimus-muted">
          Paste a GitHub personal access token for your account.
          <a
            class="text-optimus-accent"
            href="https://github.com/settings/personal-access-tokens/new"
            target="_blank"
            rel="noopener"
            >Create one</a
          >
          (fine-grained, no permissions required).
        </p>
        <input
          id="token"
          type="password"
          autocomplete="off"
          spellcheck="false"
          autofocus
          required
          placeholder="github_pat_..."
          class="mb-3 w-full rounded-xl border border-optimus-border bg-optimus-bg px-4 py-3 text-base text-optimus-text placeholder-optimus-muted focus:outline-none focus:ring-2 focus:ring-optimus-accent"
        />
        <p id="gate-error" class="mb-3 text-sm text-red-500" hidden>Sign-in failed.</p>
        <button
          type="submit"
          class="w-full rounded-xl border-0 py-3 text-base font-semibold text-white"
          style="background: linear-gradient(180deg, #d97757, #b85a3d);"
        >
          Unlock
        </button>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
