<!doctype html>
<html lang="en" class="ios">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f1e7" />
    <title>Central Optimus</title>

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Optimus" />
    <style>
      html, body { background: #f6f1e7; margin: 0; }
    </style>

    <link
      rel="apple-touch-startup-image"
      href="./icons/splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div
      id="city-root"
      style="position: fixed; inset: 0; z-index: 0;"
    ></div>

    <main
      id="app"
      class="relative mx-auto max-w-5xl px-5 pb-16"
      style="padding-top: max(env(safe-area-inset-top), 1.75rem); z-index: 10;"
      hidden
    >
      <header id="app-header" class="mb-8 flex items-center justify-end gap-2" hidden>
        <button
          id="header-settings"
          type="button"
          aria-label="Settings"
          class="icon-btn"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
        <button
          id="lock"
          type="button"
          aria-label="Lock"
          class="icon-btn"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="11" width="16" height="10" rx="2.5" />
            <path d="M8 11V8a4 4 0 0 1 8 0v3" />
          </svg>
        </button>
      </header>

      <section
        id="grid"
        aria-label="Apps"
        class="grid gap-4 sm:gap-5"
        hidden
      ></section>
      <p id="empty" class="mt-20 text-center text-optimus-muted" hidden>No apps registered yet.</p>
    </main>

    <dialog
      id="settings"
      class="co-dialog w-[min(calc(100%-2rem),22rem)] rounded-2xl p-6"
    >
      <form method="dialog" class="flex flex-col gap-4">
        <h2 class="text-lg font-semibold tracking-tight">Settings</h2>
        <fieldset class="flex flex-col gap-2">
          <legend class="text-xs font-medium uppercase tracking-[0.18em] text-optimus-muted mb-2">Layout</legend>
          <label class="flex items-center gap-3 rounded-xl border border-optimus-border bg-optimus-surface-2 px-3 py-2.5 cursor-pointer">
            <input type="radio" name="layout" value="balloons" class="accent-optimus-accent" />
            <span class="text-sm font-medium">Balloons</span>
          </label>
          <label class="flex items-center gap-3 rounded-xl border border-optimus-border bg-optimus-surface-2 px-3 py-2.5 cursor-pointer">
            <input type="radio" name="layout" value="grid" class="accent-optimus-accent" />
            <span class="text-sm font-medium">Grid</span>
          </label>
        </fieldset>
        <button
          id="settings-lock"
          type="button"
          class="btn-ghost"
        >
          Lock &amp; sign out
        </button>
        <button
          id="settings-close"
          type="submit"
          class="btn-primary"
        >
          Done
        </button>
      </form>
    </dialog>

    <dialog
      id="gate"
      class="co-dialog w-[min(calc(100%-2rem),20rem)] rounded-2xl p-6"
    >
      <form method="dialog" id="gate-form">
        <h2 class="mb-3 text-lg font-semibold tracking-tight">Sign in</h2>
        <p class="mb-3 text-sm leading-snug text-optimus-muted">
          Paste a GitHub personal access token for your account.
          <a
            class="text-optimus-accent font-medium underline-offset-2 hover:underline"
            href="https://github.com/settings/personal-access-tokens/new"
            target="_blank"
            rel="noopener"
            >Create one</a
          >
          (fine-grained, no permissions required).
        </p>
        <input
          id="token"
          type="password"
          autocomplete="off"
          spellcheck="false"
          autofocus
          required
          placeholder="github_pat_..."
          class="mb-3 w-full rounded-xl border border-optimus-border bg-optimus-surface px-4 py-3 text-base text-optimus-text placeholder-optimus-muted focus:outline-none focus:ring-2 focus:ring-optimus-accent/60"
        />
        <p id="gate-error" class="mb-3 text-sm text-red-600" hidden>Sign-in failed.</p>
        <button
          type="submit"
          class="btn-primary"
        >
          Unlock
        </button>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
