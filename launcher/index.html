<!doctype html>
<html lang="en" class="ios">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#faf9f5" />
    <title>Central Optimus</title>

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Optimus" />

    <link
      rel="apple-touch-startup-image"
      href="./icons/splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="text-optimus-text">
    <div
      id="city-root"
      style="position: fixed; inset: 0; z-index: 0;"
    ></div>

    <main
      id="app"
      class="relative mx-auto max-w-5xl px-4 pb-12"
      style="padding-top: max(env(safe-area-inset-top), 1.5rem); z-index: 10;"
      hidden
    >
      <header class="flex items-center justify-between">
        <h1 id="title" class="m-0 text-2xl font-semibold tracking-tight text-white drop-shadow-[0_2px_8px_rgba(0,0,0,0.6)]">Central Optimus</h1>
        <button
          id="lock"
          type="button"
          aria-label="Lock"
          class="rounded-full border border-white/30 bg-black/30 px-4 py-2 text-sm text-white/90 backdrop-blur transition hover:border-white/60 hover:bg-black/40"
        >
          Lock
        </button>
      </header>

      <section id="grid" hidden></section>
      <p id="empty" hidden></p>
    </main>

    <dialog
      id="gate"
      class="w-[min(calc(100%-2rem),20rem)] rounded-2xl border border-optimus-border bg-optimus-surface p-6 text-optimus-text shadow-xl backdrop:bg-black/40 backdrop:backdrop-blur"
    >
      <form method="dialog" id="gate-form">
        <h2 class="mb-3 text-lg font-semibold">Sign in</h2>
        <p class="mb-3 text-sm leading-snug text-optimus-muted">
          Paste a GitHub personal access token for your account.
          <a
            class="text-optimus-accent"
            href="https://github.com/settings/personal-access-tokens/new"
            target="_blank"
            rel="noopener"
            >Create one</a
          >
          (fine-grained, no permissions required).
        </p>
        <input
          id="token"
          type="password"
          autocomplete="off"
          spellcheck="false"
          autofocus
          required
          placeholder="github_pat_..."
          class="mb-3 w-full rounded-xl border border-optimus-border bg-optimus-bg px-4 py-3 text-base text-optimus-text placeholder-optimus-muted focus:outline-none focus:ring-2 focus:ring-optimus-accent"
        />
        <p id="gate-error" class="mb-3 text-sm text-red-500" hidden>Sign-in failed.</p>
        <button
          type="submit"
          class="w-full rounded-xl border-0 py-3 text-base font-semibold text-white"
          style="background: linear-gradient(180deg, #d97757, #b85a3d);"
        >
          Unlock
        </button>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
