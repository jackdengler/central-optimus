<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Spinning Globe — preview</title>
    <style>
      :root {
        --bg: #f6f1e7;
        --bg-2: #ece4d3;
        --surface: #fffaf1;
        --border: rgba(60, 46, 30, 0.1);
        --border-strong: rgba(60, 46, 30, 0.18);
        --ink: #1f1b16;
        --muted: #73695a;
        --accent: #c96a47;
        --shadow: 60, 46, 30;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        position: fixed;
        inset: 0;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        color: var(--ink);
        font-family:
          "SF Pro Text", -apple-system, BlinkMacSystemFont, "Inter", system-ui,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      /* Desktop: dark stage with phone centered. Mobile: device fills viewport. */
      body {
        background:
          radial-gradient(60% 60% at 50% 40%, #2a2530 0%, #14131a 70%, #0c0b11 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .device {
        position: relative;
        width: 390px;
        height: 844px;
        border-radius: 47px;
        overflow: hidden;
        background-color: var(--bg);
        background-image:
          radial-gradient(1100px 700px at 8% -10%, rgba(201,106,71,0.18), transparent 55%),
          radial-gradient(900px 600px at 110% 6%, rgba(74,124,89,0.10), transparent 55%),
          radial-gradient(800px 700px at 50% 120%, rgba(64,54,120,0.08), transparent 60%);
        box-shadow:
          0 0 0 6px #1a1a1f,
          0 0 0 8px #2c2c33,
          0 30px 80px -20px rgba(0, 0, 0, 0.6),
          0 12px 32px -8px rgba(0, 0, 0, 0.45);
        isolation: isolate;
      }
      /* iPhone 13 Pro notch */
      .device::after {
        content: "";
        position: absolute;
        top: 11px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 30px;
        background: #0a0a0e;
        border-radius: 18px;
        z-index: 30;
        pointer-events: none;
      }
      /* Noise grain overlay scoped to the device */
      .device::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.09 0 0 0 0 0.06 0 0 0 0.06 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
        opacity: 0.55;
        mix-blend-mode: multiply;
      }
      .globe-bg {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        -webkit-mask-image: radial-gradient(circle at 42% 56%, #000 32%, rgba(0,0,0,0.55) 60%, transparent 95%);
        mask-image: radial-gradient(circle at 42% 56%, #000 32%, rgba(0,0,0,0.55) 60%, transparent 95%);
        opacity: 0.92;
      }
      .shell {
        position: relative;
        z-index: 10;
        height: 100%;
        padding: 56px 22px 24px;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
      /* On real phones, drop the chrome and let the device fill */
      @media (max-width: 480px) {
        body { padding: 0; background: var(--bg); }
        .device {
          width: 100vw;
          height: 100dvh;
          border-radius: 0;
          box-shadow: none;
        }
        .device::after { display: none; }
        .shell {
          padding: max(env(safe-area-inset-top), 1.5rem) clamp(1rem, 3.5vw, 2rem)
            max(env(safe-area-inset-bottom), 1rem);
        }
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .dot {
        height: 7px;
        width: 7px;
        border-radius: 999px;
        background: #6E4DB0;
        box-shadow: 0 0 0 3px rgba(110,77,176,0.18);
      }
      h1 {
        margin: 0.4rem 0 0.4rem;
        font-size: 2.2rem;
        font-weight: 600;
        letter-spacing: -0.035em;
        line-height: 1.02;
      }
      .greeting-punct { color: var(--accent); }
      p.lede {
        margin: 0;
        max-width: 42ch;
        color: var(--muted);
        line-height: 1.5;
      }
      .panel {
        margin-top: 2rem;
        background: rgba(255, 250, 241, 0.7);
        backdrop-filter: saturate(160%) blur(14px);
        -webkit-backdrop-filter: saturate(160%) blur(14px);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1rem 1.25rem;
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.7),
          0 6px 14px -6px rgba(var(--shadow), 0.18);
        max-width: 32rem;
      }
      .panel h2 {
        margin: 0 0 0.35rem;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .panel p { margin: 0; font-size: 0.92rem; color: var(--ink); }
    </style>
    <script>
      // Belt-and-suspenders: iOS Safari sometimes ignores user-scalable=no.
      ["gesturestart", "gesturechange", "gestureend"].forEach((ev) => {
        document.addEventListener(ev, (e) => e.preventDefault(), { passive: false });
      });
      let lastTap = 0;
      document.addEventListener(
        "touchend",
        (e) => {
          const now = Date.now();
          if (now - lastTap < 350) e.preventDefault();
          lastTap = now;
        },
        { passive: false },
      );
    </script>
  </head>
  <body>
    <div class="device">
      <div id="globe-bg" class="globe-bg" aria-hidden="true"></div>

      <main class="shell">
        <p class="eyebrow"><span class="dot"></span> Wednesday, April 23 · 9:12 AM</p>
        <h1>Good morning, Jack<span class="greeting-punct">.</span></h1>
        <p class="lede">Preview of the lavender wireframe globe — same palette as the little guy.</p>
        <div class="panel">
          <h2>Preview</h2>
          <p>Rendering at iPhone 13 Pro size (390×844). On a real phone it fills the viewport.</p>
        </div>
      </main>
    </div>


    <!--
      Inline copy of launcher/globe.js so this preview is a single self-contained
      file that renders correctly when served via raw.githack.com or opened
      locally. Keep in sync with launcher/globe.js when iterating.
    -->
    <script>
      function mountGlobe(target, opts) {
        opts = opts || {};
        if (!target) throw new Error("mountGlobe: target element required");
        var nodeCount = opts.nodeCount != null ? opts.nodeCount : 46;
        var arcCount = opts.arcCount != null ? opts.arcCount : 7;
        var rotationSpeed = opts.rotationSpeed != null ? opts.rotationSpeed : 0.00012;
        var tilt = opts.tilt != null ? opts.tilt : 0.34;
        var blendMode = opts.blendMode || "multiply";
        var radiusFactor = opts.radiusFactor != null ? opts.radiusFactor : 0.7;
        var offsetX = opts.offsetX != null ? opts.offsetX : -0.08;
        var offsetY = opts.offsetY != null ? opts.offsetY : 0.06;

        var TAU = Math.PI * 2;
        var reduced = false;
        try { reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch (_) {}

        if (getComputedStyle(target).position === "static") {
          target.style.position = "relative";
        }

        var canvas = document.createElement("canvas");
        canvas.className = "co-globe";
        Object.assign(canvas.style, {
          position: "absolute", inset: "0", width: "100%", height: "100%",
          display: "block", pointerEvents: "none", mixBlendMode: blendMode,
        });
        target.appendChild(canvas);
        var ctx = canvas.getContext("2d");
        var dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
        var w = 0, h = 0, cx = 0, cy = 0, radius = 0;

        function resize() {
          var r = target.getBoundingClientRect();
          w = Math.max(1, Math.floor(r.width));
          h = Math.max(1, Math.floor(r.height));
          canvas.width = Math.floor(w * dpr);
          canvas.height = Math.floor(h * dpr);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          cx = w / 2 + w * offsetX;
          cy = h / 2 + h * offsetY;
          radius = Math.min(w, h) * radiusFactor;
        }
        var ro = new ResizeObserver(resize);
        ro.observe(target);
        resize();

        function sphericalToVec(lat, lon) {
          return {
            x: Math.cos(lat) * Math.cos(lon),
            y: Math.sin(lat),
            z: Math.cos(lat) * Math.sin(lon),
          };
        }
        function rand(a, b) { return a + Math.random() * (b - a); }

        var nodes = [];
        for (var i = 0; i < nodeCount; i++) {
          var u = Math.random(), v = Math.random();
          nodes.push({
            lat: Math.asin(2 * u - 1),
            lon: TAU * v,
            pulse: Math.random() * TAU,
            pulseSpeed: rand(0.0008, 0.0019),
            base: rand(1.2, 2.2),
          });
        }
        function makeArc() {
          var bestA = 0, bestB = 1 % nodes.length, bestDot = 1;
          for (var i = 0; i < 18; i++) {
            var ai = (Math.random() * nodes.length) | 0;
            var bi = (Math.random() * nodes.length) | 0;
            if (bi === ai) bi = (bi + 1) % nodes.length;
            var va = sphericalToVec(nodes[ai].lat, nodes[ai].lon);
            var vb = sphericalToVec(nodes[bi].lat, nodes[bi].lon);
            var d = va.x * vb.x + va.y * vb.y + va.z * vb.z;
            if (d < bestDot) { bestDot = d; bestA = ai; bestB = bi; }
          }
          return {
            a: bestA, b: bestB, t: -rand(0.1, 0.5),
            speed: rand(0.00018, 0.00032),
            hue: Math.random() < 0.55 ? "warm" : "cool",
          };
        }
        var arcs = [];
        for (var k = 0; k < arcCount; k++) arcs.push(makeArc());

        function rot(v, ya, pi) {
          var cy_ = Math.cos(ya), sy_ = Math.sin(ya);
          var x = v.x * cy_ + v.z * sy_;
          var z = -v.x * sy_ + v.z * cy_;
          var y = v.y;
          var cp = Math.cos(pi), sp = Math.sin(pi);
          return { x: x, y: y * cp - z * sp, z: y * sp + z * cp };
        }
        function project(v) { return { x: cx + v.x * radius, y: cy + v.y * radius, z: v.z }; }
        function slerp(a, b, t) {
          var dot = Math.max(-1, Math.min(1, a.x * b.x + a.y * b.y + a.z * b.z));
          var omega = Math.acos(dot);
          if (omega < 1e-4) return { x: a.x, y: a.y, z: a.z };
          var so = Math.sin(omega);
          var k0 = Math.sin((1 - t) * omega) / so;
          var k1 = Math.sin(t * omega) / so;
          return { x: a.x * k0 + b.x * k1, y: a.y * k0 + b.y * k1, z: a.z * k0 + b.z * k1 };
        }

        function drawHalo() {
          var grad = ctx.createRadialGradient(cx, cy, radius * 0.55, cx, cy, radius * 1.45);
          grad.addColorStop(0, "rgba(184, 155, 232, 0)");
          grad.addColorStop(0.55, "rgba(184, 155, 232, 0.10)");
          grad.addColorStop(1, "rgba(184, 155, 232, 0)");
          ctx.fillStyle = grad;
          ctx.beginPath(); ctx.arc(cx, cy, radius * 1.45, 0, TAU); ctx.fill();
        }
        function drawDisc() {
          var grad = ctx.createRadialGradient(cx - radius * 0.28, cy - radius * 0.32, radius * 0.18, cx, cy, radius);
          grad.addColorStop(0, "rgba(234, 215, 255, 0.22)");
          grad.addColorStop(0.55, "rgba(184, 155, 232, 0.10)");
          grad.addColorStop(1, "rgba(110, 77, 176, 0.04)");
          ctx.fillStyle = grad;
          ctx.beginPath(); ctx.arc(cx, cy, radius, 0, TAU); ctx.fill();
        }
        var segs = 64;
        function drawWireRing(vertsFn) {
          var pts = new Array(segs + 1);
          for (var j = 0; j <= segs; j++) pts[j] = vertsFn(j / segs);
          for (var j2 = 0; j2 < segs; j2++) {
            var a = pts[j2], b = pts[j2 + 1];
            var sumZ = a.z + b.z;
            var front = sumZ >= 0;
            var depth = sumZ * 0.5;
            var alpha = front ? 0.18 + 0.22 * (depth + 1) : 0.06 + 0.06 * (depth + 1);
            ctx.strokeStyle = "rgba(152, 118, 212, " + alpha.toFixed(3) + ")";
            ctx.lineWidth = front ? 0.75 : 0.5;
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
          }
        }
        function drawWireframe(yaw, pitch) {
          var latCount = 9;
          for (var i2 = 1; i2 < latCount; i2++) {
            var lat = -Math.PI / 2 + (i2 / latCount) * Math.PI;
            (function (lat) {
              drawWireRing(function (t) {
                return project(rot(sphericalToVec(lat, t * TAU), yaw, pitch));
              });
            })(lat);
          }
          var lonCount = 12;
          for (var i3 = 0; i3 < lonCount; i3++) {
            var lon = (i3 / lonCount) * TAU;
            (function (lon) {
              drawWireRing(function (t) {
                return project(rot(sphericalToVec(-Math.PI / 2 + t * Math.PI, lon), yaw, pitch));
              });
            })(lon);
          }
          ctx.beginPath(); ctx.arc(cx, cy, radius, 0, TAU);
          ctx.strokeStyle = "rgba(152, 118, 212, 0.42)";
          ctx.lineWidth = 0.9; ctx.stroke();
        }
        function drawNodes(yaw, pitch, time) {
          for (var n2 = 0; n2 < nodes.length; n2++) {
            var n = nodes[n2];
            var v = rot(sphericalToVec(n.lat, n.lon), yaw, pitch);
            if (v.z < -0.08) continue;
            var p = project(v);
            var phase = 0.5 + 0.5 * Math.sin(n.pulse + time * n.pulseSpeed);
            var depth = Math.max(0.25, v.z * 0.5 + 0.55);
            var r = n.base + phase * 1.1;
            var halo = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 6);
            halo.addColorStop(0, "rgba(255, 240, 255, " + (0.55 * depth).toFixed(3) + ")");
            halo.addColorStop(0.4, "rgba(184, 155, 232, " + (0.22 * depth).toFixed(3) + ")");
            halo.addColorStop(1, "rgba(184, 155, 232, 0)");
            ctx.fillStyle = halo;
            ctx.beginPath(); ctx.arc(p.x, p.y, r * 6, 0, TAU); ctx.fill();
            ctx.fillStyle = "rgba(255, 246, 255, " + (0.92 * depth).toFixed(3) + ")";
            ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, TAU); ctx.fill();
          }
        }
        function drawArcs(yaw, pitch, dt) {
          var arcSegs = 48;
          for (var i4 = 0; i4 < arcs.length; i4++) {
            var arc = arcs[i4];
            arc.t += arc.speed * dt;
            if (arc.t >= 1.1) { arcs[i4] = makeArc(); continue; }
            var aN = nodes[arc.a], bN = nodes[arc.b];
            if (!aN || !bN) continue;
            var va = sphericalToVec(aN.lat, aN.lon);
            var vb = sphericalToVec(bN.lat, bN.lon);
            var head = Math.max(0, Math.min(1, arc.t));
            var tail = Math.max(0, head - 0.42);
            if (head <= 0) continue;
            var pts = new Array(arcSegs + 1);
            for (var s = 0; s <= arcSegs; s++) {
              var tt = tail + (s / arcSegs) * (head - tail);
              var v0 = slerp(va, vb, tt);
              var lift = 1 + 0.18 * Math.sin(Math.PI * tt);
              var v0l = { x: v0.x * lift, y: v0.y * lift, z: v0.z * lift };
              var v = rot(v0l, yaw, pitch);
              pts[s] = { p: project(v), z: v.z };
            }
            var color = arc.hue === "warm" ? "247, 168, 208" : "152, 118, 212";
            for (var s2 = 1; s2 < pts.length; s2++) {
              var a0 = pts[s2 - 1], b0 = pts[s2];
              if (a0.z < -0.2 && b0.z < -0.2) continue;
              var headFrac = s2 / (pts.length - 1);
              var midZ = (a0.z + b0.z) * 0.5;
              var depthA = Math.max(0, Math.min(1, midZ * 2.5 + 0.5));
              var alpha = (0.12 + 0.82 * headFrac) * depthA;
              if (alpha <= 0.005) continue;
              ctx.strokeStyle = "rgba(" + color + ", " + alpha.toFixed(3) + ")";
              ctx.lineWidth = 0.7 + 1.0 * headFrac;
              ctx.beginPath(); ctx.moveTo(a0.p.x, a0.p.y); ctx.lineTo(b0.p.x, b0.p.y); ctx.stroke();
            }
            var headPt = pts[pts.length - 1];
            var prevPt = pts[pts.length - 2];
            if (headPt && prevPt && headPt.z >= -0.18) {
              var da = Math.max(0, Math.min(1, headPt.z * 2.5 + 0.45));
              if (da > 0.02) {
                var dx2 = headPt.p.x - prevPt.p.x;
                var dy2 = headPt.p.y - prevPt.p.y;
                var len2 = Math.hypot(dx2, dy2) || 1;
                var ux = dx2 / len2, uy = dy2 / len2;
                var nx2 = -uy, ny2 = ux;
                var sz = 5;
                var tipX = headPt.p.x + ux * sz * 1.6;
                var tipY = headPt.p.y + uy * sz * 1.6;
                var rearX = headPt.p.x - ux * sz * 0.8;
                var rearY = headPt.p.y - uy * sz * 0.8;
                var wingLX = headPt.p.x + nx2 * sz * 0.7;
                var wingLY = headPt.p.y + ny2 * sz * 0.7;
                var wingRX = headPt.p.x - nx2 * sz * 0.7;
                var wingRY = headPt.p.y - ny2 * sz * 0.7;
                var grad = ctx.createRadialGradient(headPt.p.x, headPt.p.y, 0, headPt.p.x, headPt.p.y, 18);
                grad.addColorStop(0, "rgba(255, 246, 255, " + (0.6 * da).toFixed(3) + ")");
                grad.addColorStop(0.4, "rgba(" + color + ", " + (0.42 * da).toFixed(3) + ")");
                grad.addColorStop(1, "rgba(255, 246, 255, 0)");
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(headPt.p.x, headPt.p.y, 18, 0, TAU); ctx.fill();
                ctx.fillStyle = "rgba(255, 248, 255, " + (0.92 * da).toFixed(3) + ")";
                ctx.beginPath();
                ctx.moveTo(tipX, tipY);
                ctx.lineTo(wingLX, wingLY);
                ctx.lineTo(rearX, rearY);
                ctx.lineTo(wingRX, wingRY);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = "rgba(" + color + ", " + (0.7 * da).toFixed(3) + ")";
                ctx.lineWidth = 0.6;
                ctx.stroke();
              }
            }
          }
        }

        var yaw = 0, last = performance.now(), destroyed = false;
        function frame(now) {
          if (destroyed) return;
          var dt = Math.min(64, now - last);
          last = now;
          if (!reduced) yaw += rotationSpeed * dt;
          ctx.clearRect(0, 0, w, h);
          drawHalo(); drawDisc();
          drawWireframe(yaw, tilt);
          drawArcs(yaw, tilt, reduced ? 0 : dt);
          drawNodes(yaw, tilt, now);
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);

        return {
          destroy: function () {
            destroyed = true;
            ro.disconnect();
            canvas.remove();
          },
        };
      }

      mountGlobe(document.getElementById("globe-bg"));
    </script>
  </body>
</html>
