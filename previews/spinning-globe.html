<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Spinning Globe — preview</title>
    <style>
      :root {
        --bg: #f6f1e7;
        --bg-2: #ece4d3;
        --surface: #fffaf1;
        --border: rgba(60, 46, 30, 0.1);
        --border-strong: rgba(60, 46, 30, 0.18);
        --ink: #1f1b16;
        --muted: #73695a;
        --accent: #c96a47;
        --shadow: 60, 46, 30;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100dvh;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family:
          "SF Pro Text", -apple-system, BlinkMacSystemFont, "Inter", system-ui,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        background-color: var(--bg);
        background-image:
          radial-gradient(1100px 700px at 8% -10%, rgba(201,106,71,0.18), transparent 55%),
          radial-gradient(900px 600px at 110% 6%, rgba(74,124,89,0.10), transparent 55%),
          radial-gradient(800px 700px at 50% 120%, rgba(64,54,120,0.08), transparent 60%);
        background-attachment: fixed;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.09 0 0 0 0 0.06 0 0 0 0.06 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
        opacity: 0.55;
        mix-blend-mode: multiply;
      }
      .globe-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        -webkit-mask-image: radial-gradient(120% 95% at 50% 45%, #000 38%, rgba(0,0,0,0.55) 70%, transparent 100%);
        mask-image: radial-gradient(120% 95% at 50% 45%, #000 38%, rgba(0,0,0,0.55) 70%, transparent 100%);
        opacity: 0.85;
      }
      .shell {
        position: relative;
        z-index: 10;
        margin: 0 auto;
        max-width: 64rem;
        min-height: 100dvh;
        padding: max(env(safe-area-inset-top), 1.5rem) clamp(1rem, 3.5vw, 2rem)
          max(env(safe-area-inset-bottom), 1rem);
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .dot {
        height: 7px;
        width: 7px;
        border-radius: 999px;
        background: #6E4DB0;
        box-shadow: 0 0 0 3px rgba(110,77,176,0.18);
      }
      h1 {
        margin: 0.4rem 0 0.4rem;
        font-size: clamp(2rem, 6vw, 3rem);
        font-weight: 600;
        letter-spacing: -0.035em;
        line-height: 1.02;
      }
      .greeting-punct { color: var(--accent); }
      p.lede {
        margin: 0;
        max-width: 42ch;
        color: var(--muted);
        line-height: 1.5;
      }
      .panel {
        margin-top: 2rem;
        background: rgba(255, 250, 241, 0.7);
        backdrop-filter: saturate(160%) blur(14px);
        -webkit-backdrop-filter: saturate(160%) blur(14px);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1rem 1.25rem;
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.7),
          0 6px 14px -6px rgba(var(--shadow), 0.18);
        max-width: 32rem;
      }
      .panel h2 {
        margin: 0 0 0.35rem;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .panel p { margin: 0; font-size: 0.92rem; color: var(--ink); }
      .controls {
        position: fixed;
        bottom: 14px;
        right: 14px;
        z-index: 20;
        display: flex;
        gap: 6px;
        background: rgba(255, 250, 241, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border-strong);
        border-radius: 999px;
        padding: 6px;
        font-size: 12px;
      }
      .controls button {
        border: 0;
        background: transparent;
        cursor: pointer;
        padding: 4px 10px;
        border-radius: 999px;
        color: var(--muted);
        font-weight: 500;
      }
      .controls button.active {
        background: #6E4DB0;
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="globe-bg" class="globe-bg" aria-hidden="true"></div>

    <main class="shell">
      <p class="eyebrow"><span class="dot"></span> Wednesday, April 23 · 9:12 AM</p>
      <h1>Good morning, Jack<span class="greeting-punct">.</span></h1>
      <p class="lede">Preview of the lavender wireframe globe behind the launcher chrome — same palette as the little guy.</p>
      <div class="panel">
        <h2>Preview</h2>
        <p>This file is at <code>previews/spinning-globe.html</code>. It only exists on the branch and is excluded from the deployed <code>_site</code> bundle.</p>
      </div>
    </main>

    <div class="controls" role="group" aria-label="Density">
      <button data-density="calm">Calm</button>
      <button data-density="default" class="active">Default</button>
      <button data-density="busy">Busy</button>
    </div>

    <script type="module">
      import { mountGlobe } from "../launcher/globe.js";

      const target = document.getElementById("globe-bg");
      let controller = mountGlobe(target);

      const presets = {
        calm:    { nodeCount: 28, arcCount: 4, rotationSpeed: 0.00012 },
        default: { nodeCount: 46, arcCount: 7, rotationSpeed: 0.00018 },
        busy:    { nodeCount: 80, arcCount: 14, rotationSpeed: 0.00026 },
      };
      document.querySelectorAll(".controls button").forEach((b) => {
        b.addEventListener("click", () => {
          document.querySelectorAll(".controls button").forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          controller.destroy();
          controller = mountGlobe(target, presets[b.dataset.density]);
        });
      });
    </script>
  </body>
</html>
