<div style="padding: 1rem 0;">
<div id="phone-frame" style="width: 320px; height: 640px; margin: 0 auto; background: #0A0A0A; border-radius: 44px; padding: 5px; position: relative; box-shadow: 0 0 0 1px #2a2a2a inset;">
  <div id="screen" style="width: 100%; height: 100%; border-radius: 39px; overflow: hidden; position: relative; background: linear-gradient(to bottom, #1B1235 0%, #3A2456 28%, #6B3866 52%, #B85575 72%, #E89368 88%, #F5B574 100%);">
    
    <div id="status-bar" style="position: absolute; top: 0; left: 0; right: 0; height: 38px; display: flex; justify-content: space-between; align-items: center; padding: 0 26px; z-index: 50; color: #fff; font-size: 14px; font-weight: 500; font-family: -apple-system, sans-serif;">
      <span id="clock">9:41</span>
      <div style="display: flex; gap: 5px; align-items: center;">
        <svg width="16" height="11" viewBox="0 0 16 11" fill="#fff"><path d="M0 8h2v3H0zM4 6h2v5H4zM8 4h2v7H8zM12 1h2v10h-2z"/></svg>
        <div style="width: 22px; height: 11px; border: 1px solid #fff; border-radius: 3px; position: relative; padding: 1px;"><div style="background: #fff; width: 75%; height: 100%; border-radius: 1.5px;"></div></div>
      </div>
    </div>

    <svg id="celestial" style="position: absolute; top: 90px; right: 38px; z-index: 2;" width="44" height="44" viewBox="0 0 44 44">
      <circle cx="22" cy="22" r="18" fill="#FAE8C8"/>
      <circle cx="22" cy="22" r="18" fill="#FAE8C8" opacity="0.3" transform="scale(1.15) translate(-3,-3)"/>
      <circle cx="16" cy="18" r="2.8" fill="#D4B896" opacity="0.6"/>
      <circle cx="27" cy="25" r="1.8" fill="#D4B896" opacity="0.6"/>
    </svg>

    <div id="lightning-flash" style="position: absolute; inset: 0; background: rgba(180, 200, 255, 0); z-index: 49; pointer-events: none; transition: background 0.1s;"></div>
    
    <div id="stars" style="position: absolute; inset: 0; z-index: 1; pointer-events: none;"></div>
    <div id="satellite-layer" style="position: absolute; inset: 0; z-index: 1; pointer-events: none;"></div>
    <div id="mountain-layer" style="position: absolute; bottom: 200px; left: 0; height: 50px; z-index: 2; will-change: transform; pointer-events: none;"></div>
    <div id="haze" style="position: absolute; bottom: 80px; left: 0; right: 0; height: 180px; z-index: 2; pointer-events: none; background: linear-gradient(to bottom, rgba(184,85,117,0) 0%, rgba(184,85,117,0.15) 70%, rgba(232,147,104,0.22) 100%);"></div>
    <div id="cloud-layer" style="position: absolute; top: 60px; left: 0; right: 0; height: 200px; z-index: 2; will-change: transform; pointer-events: none;"></div>
    <div id="sky-events" style="position: absolute; inset: 0; z-index: 3; pointer-events: none;"></div>

    <div id="city-far" style="position: absolute; bottom: 100px; left: 0; height: 130px; will-change: transform; z-index: 3;"></div>
    <div id="city-mid" style="position: absolute; bottom: 60px; left: 0; height: 175px; will-change: transform; z-index: 4;"></div>
    
    <div id="city-near" style="position: absolute; bottom: 0; left: 0; height: 215px; will-change: transform; z-index: 6;"></div>
    
    <div id="rooftop-events" style="position: absolute; bottom: 0; left: 0; height: 215px; z-index: 7; pointer-events: none; will-change: transform;"></div>
    
    <div id="river-layer" style="position: absolute; bottom: 0; left: 0; height: 22px; z-index: 5; pointer-events: none; will-change: transform;"></div>
    <div id="water-events" style="position: absolute; bottom: 0; left: 0; height: 28px; z-index: 7; pointer-events: none; will-change: transform;"></div>
    
    <div id="balloon-layer" style="position: absolute; inset: 0; z-index: 8;"></div>
    
    <div id="powerline-layer" style="position: absolute; top: 30px; left: 0; right: 0; height: 50px; z-index: 9; pointer-events: none;"></div>
  </div>
</div>

<div style="text-align: center; margin-top: 12px; display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;">
  <button onclick="toggleCalm()" id="calm-btn" style="font-size: 12px;">pause</button>
  <button onclick="cycleTime()" id="time-btn" style="font-size: 12px;">dusk</button>
  <button onclick="warp(0)" style="font-size: 11px;">downtown</button>
  <button onclick="warp(1)" style="font-size: 11px;">harbor</button>
  <button onclick="warp(2)" style="font-size: 11px;">midtown</button>
  <button onclick="warp(3)" style="font-size: 11px;">bridge</button>
  <button onclick="warp(4)" style="font-size: 11px;">uptown</button>
</div>
</div>

<script>
(function(){
  const SCREEN_W = 310;
  const SCREEN_H = 630;
  const NEAR_H = 215;
  
  const apps = [
    {color: '#3B82F6', shade: '#1E40AF', icon: 'mail'},
    {color: '#F97316', shade: '#9A3412', icon: 'music'},
    {color: '#A855F7', shade: '#6B21A8', icon: 'camera'},
    {color: '#22C55E', shade: '#15803D', icon: 'chat'},
    {color: '#EF4444', shade: '#991B1B', icon: 'cal'},
    {color: '#FBBF24', shade: '#92400E', icon: 'notes'},
    {color: '#06B6D4', shade: '#0E7490', icon: 'map'},
    {color: '#EC4899', shade: '#9D174D', icon: 'weather'},
  ];

  function iconPath(type, color) {
    switch(type) {
      case 'mail': return `<g><rect x="-11" y="-7" width="22" height="15" rx="2.5" fill="#fff"/><path d="M-11 -5.5 L0 3 L11 -5.5" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round"/></g>`;
      case 'music': return `<g fill="#fff"><path d="M-2 -8 L8 -10 L8 4 Q8 7 5 7 Q2 7 2 4.5 Q2 2 5 2 Q6 2 7 2.3 L7 -8 L-1 -6.5 L-1 6 Q-1 9 -4 9 Q-7 9 -7 6.5 Q-7 4 -4 4 Q-3 4 -2 4.3 Z"/></g>`;
      case 'camera': return `<g><rect x="-12" y="-5" width="24" height="15" rx="2.5" fill="#fff"/><rect x="-5" y="-9" width="10" height="5" rx="1.2" fill="#fff"/><circle cx="0" cy="3" r="5" fill="${color}"/><circle cx="0" cy="3" r="3.5" fill="none" stroke="#fff" stroke-width="0.8"/></g>`;
      case 'chat': return `<g fill="#fff"><path d="M-11 -5 Q-11 -9 -7 -9 L7 -9 Q11 -9 11 -5 L11 3 Q11 7 7 7 L-2 7 L-7 11 L-6 7 Q-11 7 -11 3 Z"/><circle cx="-4" cy="-1" r="1.3" fill="${color}"/><circle cx="0" cy="-1" r="1.3" fill="${color}"/><circle cx="4" cy="-1" r="1.3" fill="${color}"/></g>`;
      case 'cal': return `<g><rect x="-10" y="-9" width="20" height="18" rx="2" fill="#fff"/><rect x="-10" y="-9" width="20" height="5" rx="2" fill="${color}"/><text x="0" y="6" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="${color}">20</text></g>`;
      case 'notes': return `<g><rect x="-9" y="-10" width="18" height="20" rx="1.5" fill="#FEF8E7"/><path d="M-9 -10 L9 -10 L9 -5 L4 -10 Z" fill="#F5E6B8"/><line x1="-6" y1="-3" x2="6" y2="-3" stroke="${color}" stroke-width="0.9" opacity="0.7"/><line x1="-6" y1="0" x2="6" y2="0" stroke="${color}" stroke-width="0.9" opacity="0.7"/><line x1="-6" y1="3" x2="6" y2="3" stroke="${color}" stroke-width="0.9" opacity="0.7"/></g>`;
      case 'map': return `<g><path d="M-12 -7 L-4 -10 L4 -7 L12 -10 L12 8 L4 11 L-4 8 L-12 11 Z" fill="#fff"/><path d="M-4 -10 L-4 8 M4 -7 L4 11" stroke="${color}" stroke-width="0.7" opacity="0.5"/><circle cx="0" cy="-1" r="3" fill="${color}"/><circle cx="0" cy="-1" r="1.2" fill="#fff"/></g>`;
      case 'weather': return `<g><circle cx="-2" cy="-3" r="5" fill="#FBBF24"/><path d="M-8 4 Q-8 -1 -3 -1 Q-2 -4 2 -4 Q7 -4 8 0 Q12 0 12 4 Q12 8 8 8 L-4 8 Q-8 8 -8 4 Z" fill="#fff"/></g>`;
    }
    return '';
  }

  // ============ CITY DISTRICTS ============
  const DISTRICT_W = SCREEN_W * 1.5;
  const NUM_DISTRICTS = 5;
  const TOTAL_W = DISTRICT_W * NUM_DISTRICTS;
  // 0=DOWNTOWN, 1=HARBOR, 2=MIDTOWN, 3=BRIDGE, 4=UPTOWN

  function addWindows(windows, bx, by, bw, bh, density) {
    density = density || 0.42;
    const wRows = Math.floor((bh - 10) / 7);
    const wCols = Math.max(2, Math.floor(bw / 6));
    const colSpacing = bw / (wCols + 1);
    for (let r = 0; r < wRows; r++) for (let c = 0; c < wCols; c++) {
      if (Math.random() > density + 0.1) {
        const wx = bx + colSpacing * (c + 1) - 1.2;
        const wy = by + 8 + r * 7;
        if (wy < NEAR_H - 6) {
          const lit = Math.random();
          let color = '#FFD580', op = 1;
          if (lit < 0.1) color = '#9FE1FF';
          else if (lit < 0.16) color = '#FF9F70';
          else if (lit > 0.72) { op = 0.45; color = '#4A3A20'; }
          if (op > 0.8 && (color === '#FFD580' || color === '#FF9F70')) {
            windows.push(`<rect x="${(wx-0.5).toFixed(1)}" y="${(wy-0.5).toFixed(1)}" width="3.5" height="4.2" fill="${color}" opacity="0.22"/>`);
          }
          windows.push(`<rect x="${wx.toFixed(1)}" y="${wy.toFixed(1)}" width="2.5" height="3.2" fill="${color}" opacity="${op}"/>`);
        }
      }
    }
  }

  function buildDowntown(startX, parts, windows, signs, extras) {
    const h = NEAR_H;
    const endX = startX + DISTRICT_W;
    
    // Theater placed off-center
    const theaterX = startX + 30 + Math.random() * 80;
    const tw = 56, th = 165;
    let fillX = startX;
    while (fillX < theaterX - 10) {
      const bw = 26 + Math.random() * 14;
      const bh = 90 + Math.random() * 35;
      parts.push(`<rect x="${fillX}" y="${h - bh}" width="${bw}" height="${bh}" fill="#080419"/>`);
      if (Math.random() > 0.5) parts.push(`<rect x="${fillX - 1}" y="${h - bh - 2}" width="${bw + 2}" height="3" fill="#080419"/>`);
      addWindows(windows, fillX, h - bh, bw, bh);
      fillX += bw + 2;
    }
    // Theater
    parts.push(`<rect x="${theaterX}" y="${h - th}" width="${tw}" height="${th}" fill="#080419"/>`);
    parts.push(`<rect x="${theaterX - 3}" y="${h - th - 3}" width="${tw + 6}" height="4" fill="#080419"/>`);
    parts.push(`<rect x="${theaterX + tw/2 - 3}" y="${h - th - 18}" width="6" height="15" fill="#080419"/>`);
    parts.push(`<polygon points="${theaterX + tw/2 - 6},${h - th - 18} ${theaterX + tw/2},${h - th - 30} ${theaterX + tw/2 + 6},${h - th - 18}" fill="#080419"/>`);
    parts.push(`<circle cx="${theaterX + tw/2}" cy="${h - th - 32}" r="1.2" fill="#FFE070" class="blink"/>`);
    const sw = tw - 6, sh = 14;
    const sx = theaterX + 3, sy = h - th + 8;
    signs.push(`<rect x="${sx - 1}" y="${sy - 1}" width="${sw + 2}" height="${sh + 2}" fill="#FFD580" opacity="0.15"/>`);
    signs.push(`<rect x="${sx}" y="${sy}" width="${sw}" height="${sh}" rx="1" fill="#080419" stroke="#FFD580" stroke-width="0.7"/>`);
    signs.push(`<text x="${sx + sw/2}" y="${sy + 6}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="6" font-weight="700" fill="#FFD580" letter-spacing="0.5">ROXY</text>`);
    signs.push(`<text x="${sx + sw/2}" y="${sy + 11.5}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="3.5" fill="#FFB070" letter-spacing="0.2">★ ★ ★</text>`);
    for (let bi = 0; bi < 8; bi++) {
      const bx = sx + (bi / 7) * sw;
      signs.push(`<circle cx="${bx}" cy="${sy - 1.5}" r="0.6" fill="#FFE070" opacity="${0.6 + Math.random() * 0.4}"/>`);
      signs.push(`<circle cx="${bx}" cy="${sy + sh + 1.5}" r="0.6" fill="#FFE070" opacity="${0.6 + Math.random() * 0.4}"/>`);
    }
    addWindows(windows, theaterX, h - th + 30, tw, th - 30);
    
    // Continue with buildings, including a CHURCH STEEPLE landmark
    fillX = theaterX + tw + 4;
    let didChurch = false;
    while (fillX < endX) {
      if (!didChurch && fillX > endX - 100 && Math.random() > 0.3) {
        // Church
        didChurch = true;
        const cw = 32, ch = 70;
        parts.push(`<rect x="${fillX}" y="${h - ch}" width="${cw}" height="${ch}" fill="#080419"/>`);
        // arched door
        parts.push(`<path d="M ${fillX + cw/2 - 4} ${h} L ${fillX + cw/2 - 4} ${h - 14} Q ${fillX + cw/2} ${h - 18} ${fillX + cw/2 + 4} ${h - 14} L ${fillX + cw/2 + 4} ${h}" fill="#1a0e35"/>`);
        // round window
        signs.push(`<circle cx="${fillX + cw/2}" cy="${h - ch + 20}" r="3" fill="#FFD580" opacity="0.85"/>`);
        signs.push(`<circle cx="${fillX + cw/2}" cy="${h - ch + 20}" r="3.5" fill="#FFD580" opacity="0.2"/>`);
        // steeple
        const stX = fillX + cw / 2;
        parts.push(`<rect x="${stX - 5}" y="${h - ch - 12}" width="10" height="12" fill="#080419"/>`);
        parts.push(`<polygon points="${stX - 6},${h - ch - 12} ${stX},${h - ch - 35} ${stX + 6},${h - ch - 12}" fill="#080419"/>`);
        // cross
        parts.push(`<rect x="${stX - 0.4}" y="${h - ch - 42}" width="0.8" height="7" fill="#080419"/>`);
        parts.push(`<rect x="${stX - 1.5}" y="${h - ch - 39}" width="3" height="0.8" fill="#080419"/>`);
        // bell window
        signs.push(`<rect x="${stX - 2}" y="${h - ch - 8}" width="4" height="5" fill="#FFD580" opacity="0.7"/>`);
        fillX += cw + 2;
        continue;
      }
      const bw = 24 + Math.random() * 14;
      const bh = 95 + Math.random() * 40;
      parts.push(`<rect x="${fillX}" y="${h - bh}" width="${bw}" height="${bh}" fill="#080419"/>`);
      if (Math.random() > 0.5) parts.push(`<rect x="${fillX - 1}" y="${h - bh - 2}" width="${bw + 2}" height="3" fill="#080419"/>`);
      addWindows(windows, fillX, h - bh, bw, bh);
      fillX += bw + 2;
    }
  }

  function buildHarbor(startX, parts, windows, signs, extras) {
    const h = NEAR_H;
    const endX = startX + DISTRICT_W;
    let x = startX;
    let didBillboard = false, didLighthouse = false;
    
    while (x < endX) {
      // LIGHTHOUSE at the very right of harbor district (where it meets midtown)
      if (!didLighthouse && x > endX - 50) {
        didLighthouse = true;
        const lhX = x;
        const lhBaseW = 18, lhBaseH = 14;
        // rocky base
        parts.push(`<polygon points="${lhX - 2},${h} ${lhX + lhBaseW + 2},${h} ${lhX + lhBaseW},${h - lhBaseH} ${lhX},${h - lhBaseH}" fill="#080419"/>`);
        // tower (tapered)
        parts.push(`<polygon points="${lhX + 3},${h - lhBaseH} ${lhX + lhBaseW - 3},${h - lhBaseH} ${lhX + lhBaseW - 5},${h - lhBaseH - 50} ${lhX + 5},${h - lhBaseH - 50}" fill="#080419"/>`);
        // red & white stripes (just two darker bands suggested)
        signs.push(`<polygon points="${lhX + 3.5},${h - lhBaseH - 16} ${lhX + lhBaseW - 3.5},${h - lhBaseH - 16} ${lhX + lhBaseW - 4},${h - lhBaseH - 22} ${lhX + 4},${h - lhBaseH - 22}" fill="#E24B4A" opacity="0.7"/>`);
        signs.push(`<polygon points="${lhX + 4.4},${h - lhBaseH - 32} ${lhX + lhBaseW - 4.4},${h - lhBaseH - 32} ${lhX + lhBaseW - 5},${h - lhBaseH - 38} ${lhX + 5},${h - lhBaseH - 38}" fill="#E24B4A" opacity="0.7"/>`);
        // gallery rail
        parts.push(`<rect x="${lhX + 3}" y="${h - lhBaseH - 52}" width="${lhBaseW - 6}" height="2" fill="#080419"/>`);
        parts.push(`<rect x="${lhX + 1}" y="${h - lhBaseH - 53}" width="${lhBaseW - 2}" height="1.5" fill="#080419"/>`);
        // lamp room
        parts.push(`<rect x="${lhX + 5}" y="${h - lhBaseH - 60}" width="${lhBaseW - 10}" height="8" fill="#080419"/>`);
        // BIG GLOWING LAMP (animated via SVG opacity in style)
        signs.push(`<circle cx="${lhX + lhBaseW/2}" cy="${h - lhBaseH - 56}" r="2.5" fill="#FFE890" class="lighthouse-lamp"/>`);
        signs.push(`<circle cx="${lhX + lhBaseW/2}" cy="${h - lhBaseH - 56}" r="5" fill="#FFE890" opacity="0.4" class="lighthouse-glow"/>`);
        signs.push(`<circle cx="${lhX + lhBaseW/2}" cy="${h - lhBaseH - 56}" r="9" fill="#FFE890" opacity="0.18" class="lighthouse-glow"/>`);
        // dome cap
        parts.push(`<path d="M ${lhX + 5} ${h - lhBaseH - 60} Q ${lhX + lhBaseW/2} ${h - lhBaseH - 70} ${lhX + lhBaseW - 5} ${h - lhBaseH - 60}" fill="#080419"/>`);
        // little finial
        parts.push(`<rect x="${lhX + lhBaseW/2 - 0.4}" y="${h - lhBaseH - 75}" width="0.8" height="6" fill="#080419"/>`);
        signs.push(`<circle cx="${lhX + lhBaseW/2}" cy="${h - lhBaseH - 76}" r="0.8" fill="#FF3030" class="blink"/>`);
        x += lhBaseW + 6;
        continue;
      }
      
      const t = Math.random();
      let bw, bh;
      if (t < 0.3) {
        bw = 40 + Math.random() * 16;
        bh = 60 + Math.random() * 25;
        parts.push(`<rect x="${x}" y="${h - bh}" width="${bw}" height="${bh}" fill="#080419"/>`);
        const peaks = 3;
        for (let p = 0; p < peaks; p++) {
          const px = x + (p + 0.5) * bw / peaks;
          parts.push(`<polygon points="${px - bw/(peaks*2)},${h - bh} ${px},${h - bh - 8} ${px + bw/(peaks*2)},${h - bh}" fill="#080419"/>`);
        }
        if (!didBillboard && Math.random() > 0.3) {
          didBillboard = true;
          const bbW = bw + 4, bbH = 14;
          const bbX = x - 2, bbY = h - bh - 22;
          const colors = ['#9FE1FF', '#FFD580', '#FF6B9D', '#A8FFB0'];
          const sc = colors[Math.floor(Math.random() * colors.length)];
          const msgs = ['HARBOR FRESH', 'COLD BEER', 'OPEN LATE', 'BAIT & TACKLE'];
          const msg = msgs[Math.floor(Math.random() * msgs.length)];
          signs.push(`<rect x="${bbX - 1}" y="${bbY - 1}" width="${bbW + 2}" height="${bbH + 2}" fill="${sc}" opacity="0.12"/>`);
          signs.push(`<rect x="${bbX}" y="${bbY}" width="${bbW}" height="${bbH}" fill="#080419" stroke="${sc}" stroke-width="0.6"/>`);
          signs.push(`<text x="${bbX + bbW/2}" y="${bbY + 9}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="5.5" font-weight="700" fill="${sc}" letter-spacing="0.3">${msg}</text>`);
          signs.push(`<line x1="${bbX + 4}" y1="${bbY + bbH}" x2="${bbX + 4}" y2="${h - bh}" stroke="#080419" stroke-width="0.6"/>`);
          signs.push(`<line x1="${bbX + bbW - 4}" y1="${bbY + bbH}" x2="${bbX + bbW - 4}" y2="${h - bh}" stroke="#080419" stroke-width="0.6"/>`);
        }
      }
      else if (t < 0.5) {
        bw = 12; bh = 110;
        parts.push(`<rect x="${x}" y="${h - bh}" width="2" height="${bh}" fill="#080419"/>`);
        parts.push(`<rect x="${x}" y="${h - bh}" width="${bw}" height="2" fill="#080419"/>`);
        parts.push(`<line x1="${x + 2}" y1="${h - bh}" x2="${x + bw}" y2="${h - bh + 8}" stroke="#080419" stroke-width="0.8"/>`);
        parts.push(`<line x1="${x + bw - 2}" y1="${h - bh + 1}" x2="${x + bw - 2}" y2="${h - bh + 8}" stroke="#080419" stroke-width="0.5"/>`);
        parts.push(`<rect x="${x - 1}" y="${h - 30}" width="4" height="30" fill="#080419"/>`);
      }
      else {
        bw = 24 + Math.random() * 12;
        bh = 35 + Math.random() * 25;
        parts.push(`<rect x="${x}" y="${h - bh}" width="${bw}" height="${bh}" fill="#080419"/>`);
        if (Math.random() > 0.5) {
          for (let s = 0; s < 3; s++) {
            parts.push(`<line x1="${x}" y1="${h - bh + (s+1)*bh/4}" x2="${x + bw}" y2="${h - bh + (s+1)*bh/4}" stroke="#1a0f30" stroke-width="0.4"/>`);
          }
        }
      }
      addWindows(windows, x, h - bh, bw, bh, 0.55);
      x += bw + 1;
    }
  }

  function buildMidtown(startX, parts, windows, signs, extras) {
    const h = NEAR_H;
    const endX = startX + DISTRICT_W;
    let x = startX;
    let didStadium = false;
    
    while (x < endX) {
      // STADIUM landmark in midtown
      if (!didStadium && x > startX + DISTRICT_W * 0.4 && x < startX + DISTRICT_W * 0.6) {
        didStadium = true;
        const stX = x, stW = 70, stH = 50;
        // bowl shape
        parts.push(`<path d="M ${stX} ${h} L ${stX} ${h - 30} Q ${stX} ${h - stH} ${stX + 10} ${h - stH} L ${stX + stW - 10} ${h - stH} Q ${stX + stW} ${h - stH} ${stX + stW} ${h - 30} L ${stX + stW} ${h} Z" fill="#080419"/>`);
        // light pylons
        for (let p = 0; p < 4; p++) {
          const px = stX + 10 + p * (stW - 20) / 3;
          parts.push(`<rect x="${px - 0.6}" y="${h - stH - 22}" width="1.2" height="22" fill="#080419"/>`);
          // light banks
          parts.push(`<rect x="${px - 4}" y="${h - stH - 26}" width="8" height="4" fill="#080419"/>`);
          extras.push(`<rect x="${px - 3.5}" y="${h - stH - 25}" width="7" height="3" fill="#FFE890" opacity="0.85"/>`);
          extras.push(`<rect x="${px - 5}" y="${h - stH - 26.5}" width="10" height="6" fill="#FFE890" opacity="0.18"/>`);
        }
        // arched entry
        parts.push(`<path d="M ${stX + stW/2 - 5} ${h} L ${stX + stW/2 - 5} ${h - 12} Q ${stX + stW/2} ${h - 16} ${stX + stW/2 + 5} ${h - 12} L ${stX + stW/2 + 5} ${h}" fill="#1a0e35"/>`);
        // glow on the field below — soft halo
        extras.push(`<ellipse cx="${stX + stW/2}" cy="${h - 8}" rx="${stW/2 - 3}" ry="6" fill="#FFE890" opacity="0.18"/>`);
        x += stW + 4;
        continue;
      }
      
      const t = Math.random(); let bw, bh;
      if (t < 0.18) {
        bw = 32 + Math.random() * 12; bh = 150 + Math.random() * 40;
        parts.push(`<rect x="${x}" y="${h - bh}" width="${bw}" height="${bh}" fill="#080419"/>`);
        parts.push(`<rect x="${x - 2}" y="${h - bh - 4}" width="${bw + 4}" height="4" fill="#080419"/>`);
        parts.push(`<rect x="${x + bw/2 - 2}" y="${h - bh - 16}" width="4" height="12" fill="#080419"/>`);
      } else if (t < 0.34) {
        bw = 18 + Math.random() * 10; bh = 175 + Math.random() * 30;
        parts.push(`<rect x="${x}" y="${h - bh}" width="${bw}" height="${bh}" fill="#080419"/>`);
        parts.push(`<rect x="${x + bw/2 - 0.6}" y="${h - bh - 14}" width="1.2" height="14" fill="#080419"/>`);
        parts.push(`<circle cx="${x + bw/2}" cy="${h - bh - 14}" r="1" fill="#FF3030" class="blink"/>`);
      } else if (t < 0.5) {
        bw = 38 + Math.random() * 14; bh = 105 + Math.random() * 35;
        parts.push(`<rect x="${x}" y="${h - bh}" width="${bw}" height="${bh}" fill="#080419"/>`);
        for (let i = 0; i < 4; i++) {
          const tx = x + 4 + i * (bw - 8) / 3;
          parts.push(`<rect x="${tx - 1}" y="${h - bh - 8}" width="2" height="8" fill="#080419"/>`);
        }
      } else {
        bw = 30 + Math.random() * 14; bh = 95 + Math.random() * 40;
        parts.push(`<rect x="${x}" y="${h - bh}" width="${bw}" height="${bh}" fill="#080419"/>`);
      }
      addWindows(windows, x, h - bh, bw, bh);
      x += bw + 1;
    }
  }

  function buildBridgeDistrict(startX, parts, windows, signs, extras) {
    const h = NEAR_H;
    const endX = startX + DISTRICT_W;
    const bankW = 90;
    let lx = startX;
    while (lx < startX + bankW - 4) {
      const bw = 20 + Math.random() * 12;
      const bh = 70 + Math.random() * 30;
      parts.push(`<rect x="${lx}" y="${h - bh}" width="${bw}" height="${bh}" fill="#080419"/>`);
      addWindows(windows, lx, h - bh, bw, bh);
      lx += bw + 2;
    }
    let rx = startX + DISTRICT_W - bankW;
    while (rx < endX) {
      const bw = 20 + Math.random() * 12;
      const bh = 70 + Math.random() * 30;
      parts.push(`<rect x="${rx}" y="${h - bh}" width="${bw}" height="${bh}" fill="#080419"/>`);
      addWindows(windows, rx, h - bh, bw, bh);
      rx += bw + 2;
    }
    const bridgeStartX = startX + bankW;
    const bridgeEndX = startX + DISTRICT_W - bankW;
    const bridgeY = h - 30;
    const bridgeSpan = bridgeEndX - bridgeStartX;
    extras.push(`<rect x="${bridgeStartX}" y="${bridgeY}" width="${bridgeSpan}" height="3" fill="#080419"/>`);
    for (let p = 0; p < 3; p++) {
      const px = bridgeStartX + (p / 2) * bridgeSpan;
      extras.push(`<rect x="${px - 2}" y="${bridgeY - 38}" width="4" height="38" fill="#080419"/>`);
      extras.push(`<rect x="${px - 6}" y="${bridgeY - 38}" width="12" height="3" fill="#080419"/>`);
    }
    extras.push(`<path d="M ${bridgeStartX} ${bridgeY - 35} Q ${bridgeStartX + bridgeSpan/4} ${bridgeY - 12} ${bridgeStartX + bridgeSpan/2} ${bridgeY - 35} Q ${bridgeStartX + 3*bridgeSpan/4} ${bridgeY - 12} ${bridgeEndX} ${bridgeY - 35}" fill="none" stroke="#080419" stroke-width="0.8"/>`);
    for (let c = 0; c < 6; c++) {
      const cx = bridgeStartX + Math.random() * bridgeSpan;
      extras.push(`<circle cx="${cx}" cy="${bridgeY - 1}" r="0.8" fill="#FFE070" opacity="0.9"/>`);
      extras.push(`<circle cx="${cx + 8}" cy="${bridgeY - 1}" r="0.7" fill="#FF4040" opacity="0.7"/>`);
    }
  }

  function buildUptown(startX, parts, windows, signs, extras) {
    const h = NEAR_H;
    const endX = startX + DISTRICT_W;
    let x = startX;
    
    // FERRIS WHEEL at left of uptown
    const fwX = startX + 20, fwR = 32, fwCY = h - 50;
    // base structure (A-frame)
    parts.push(`<polygon points="${fwX - 10},${h} ${fwX},${fwCY} ${fwX + 10},${h}" fill="#080419"/>`);
    parts.push(`<polygon points="${fwX + 2*fwR - 10},${h} ${fwX + 2*fwR},${fwCY} ${fwX + 2*fwR + 10},${h}" fill="#080419"/>`);
    parts.push(`<line x1="${fwX}" y1="${fwCY}" x2="${fwX + 2*fwR}" y2="${fwCY}" stroke="#080419" stroke-width="2"/>`);
    // wheel rim (2 concentric circles)
    extras.push(`<circle cx="${fwX + fwR}" cy="${fwCY}" r="${fwR}" fill="none" stroke="#080419" stroke-width="0.8"/>`);
    extras.push(`<circle cx="${fwX + fwR}" cy="${fwCY}" r="${fwR - 2}" fill="none" stroke="#080419" stroke-width="0.5"/>`);
    extras.push(`<circle cx="${fwX + fwR}" cy="${fwCY}" r="3" fill="#080419"/>`);
    // 12 spokes with colored bulbs at each end
    const fwColors = ['#FFD580', '#FF6B9D', '#9FE1FF', '#A8FFB0', '#FFE890'];
    for (let s = 0; s < 12; s++) {
      const ang = (s / 12) * Math.PI * 2;
      const x2 = fwX + fwR + Math.cos(ang) * fwR;
      const y2 = fwCY + Math.sin(ang) * fwR;
      extras.push(`<line x1="${fwX + fwR}" y1="${fwCY}" x2="${x2}" y2="${y2}" stroke="#080419" stroke-width="0.5" opacity="0.6"/>`);
      // gondola
      const gX = fwX + fwR + Math.cos(ang) * (fwR - 1);
      const gY = fwCY + Math.sin(ang) * (fwR - 1);
      const col = fwColors[s % fwColors.length];
      extras.push(`<rect x="${gX - 2}" y="${gY - 1.5}" width="4" height="3" rx="0.5" fill="#080419"/>`);
      extras.push(`<rect x="${gX - 1.6}" y="${gY - 1.1}" width="3.2" height="2.2" rx="0.3" fill="${col}" opacity="0.9"/>`);
    }
    // chasing lights around the rim
    for (let l = 0; l < 24; l++) {
      const ang = (l / 24) * Math.PI * 2;
      const lx = fwX + fwR + Math.cos(ang) * (fwR + 1);
      const ly = fwCY + Math.sin(ang) * (fwR + 1);
      const col = fwColors[l % fwColors.length];
      const delay = (l / 24) * 2;
      extras.push(`<circle cx="${lx}" cy="${ly}" r="0.8" fill="${col}" style="animation: blink 2s infinite; animation-delay: ${delay.toFixed(1)}s;"/>`);
    }
    
    x = fwX + 2 * fwR + 18;
    
    // Observation tower somewhere after ferris wheel
    const towerX = x + 30 + Math.random() * 40;
    while (x < towerX - 6) {
      const bw = 18 + Math.random() * 14;
      const bh = 130 + Math.random() * 50;
      parts.push(`<rect x="${x}" y="${h - bh}" width="${bw}" height="${bh}" fill="#080419"/>`);
      if (Math.random() > 0.5) {
        parts.push(`<rect x="${x + bw/2 - 0.6}" y="${h - bh - 10}" width="1.2" height="10" fill="#080419"/>`);
        parts.push(`<circle cx="${x + bw/2}" cy="${h - bh - 10}" r="0.9" fill="#FF3030" class="blink"/>`);
      }
      addWindows(windows, x, h - bh, bw, bh);
      x += bw + 2;
    }
    const towerW = 14, towerH = 200;
    parts.push(`<rect x="${towerX}" y="${h - towerH}" width="${towerW}" height="${towerH}" fill="#080419"/>`);
    parts.push(`<rect x="${towerX - 6}" y="${h - towerH - 10}" width="${towerW + 12}" height="10" fill="#080419"/>`);
    parts.push(`<rect x="${towerX - 8}" y="${h - towerH - 14}" width="${towerW + 16}" height="4" fill="#080419"/>`);
    for (let r = 0; r < 7; r++) {
      const lx = towerX - 7 + r * (towerW + 14) / 6;
      extras.push(`<rect x="${lx}" y="${h - towerH - 9}" width="1.2" height="2" fill="#FFD580" opacity="${0.7 + Math.random() * 0.3}"/>`);
    }
    parts.push(`<rect x="${towerX + towerW/2 - 0.6}" y="${h - towerH - 30}" width="1.2" height="16" fill="#080419"/>`);
    parts.push(`<circle cx="${towerX + towerW/2}" cy="${h - towerH - 30}" r="1.3" fill="#FF2020" class="blink"/>`);
    for (let r = 0; r < Math.floor(towerH / 10); r++) {
      extras.push(`<rect x="${towerX + 2}" y="${h - towerH + 8 + r * 10}" width="${towerW - 4}" height="2" fill="#FFD580" opacity="${Math.random() > 0.4 ? 0.8 : 0.3}"/>`);
    }
    x = towerX + towerW + 4;
    while (x < endX) {
      const bw = 18 + Math.random() * 14;
      const bh = 130 + Math.random() * 50;
      parts.push(`<rect x="${x}" y="${h - bh}" width="${bw}" height="${bh}" fill="#080419"/>`);
      if (Math.random() > 0.5) {
        parts.push(`<rect x="${x + bw/2 - 0.6}" y="${h - bh - 10}" width="1.2" height="10" fill="#080419"/>`);
        parts.push(`<circle cx="${x + bw/2}" cy="${h - bh - 10}" r="0.9" fill="#FF3030" class="blink"/>`);
      }
      addWindows(windows, x, h - bh, bw, bh);
      x += bw + 2;
    }
  }

  function buildNearCity(layerEl) {
    let svg = `<svg width="${TOTAL_W * 2}" height="${NEAR_H}" viewBox="0 0 ${TOTAL_W * 2} ${NEAR_H}" style="display:block;">`;
    let allDistricts = '';
    for (let loop = 0; loop < 2; loop++) {
      for (let d = 0; d < NUM_DISTRICTS; d++) {
        const parts = [], windows = [], signs = [], extras = [];
        const startX = loop * TOTAL_W + d * DISTRICT_W;
        if (d === 0) buildDowntown(startX, parts, windows, signs, extras);
        else if (d === 1) buildHarbor(startX, parts, windows, signs, extras);
        else if (d === 2) buildMidtown(startX, parts, windows, signs, extras);
        else if (d === 3) buildBridgeDistrict(startX, parts, windows, signs, extras);
        else if (d === 4) buildUptown(startX, parts, windows, signs, extras);
        allDistricts += parts.join('') + windows.join('') + signs.join('') + extras.join('');
      }
    }
    svg += allDistricts + '</svg>';
    layerEl.innerHTML = svg;
    layerEl.style.width = (TOTAL_W * 2) + 'px';
    layerEl._totalW = TOTAL_W;
  }

  function buildMidCity(layerEl) {
    const h = 175;
    let svg = `<svg width="${TOTAL_W * 2}" height="${h}" viewBox="0 0 ${TOTAL_W * 2} ${h}" style="display:block;">`;
    function buildSection(offsetX) {
      let parts = []; let x = offsetX;
      const windows = [], features = [];
      while (x < offsetX + TOTAL_W) {
        const t = Math.random(); let bw, bh;
        if (t < 0.1) { bw = 38; bh = 155; parts.push(`<path d="M ${x} ${h} L ${x} ${h - bh + 14} L ${x + 6} ${h - bh + 6} L ${x + bw/2 - 4} ${h - bh + 6} L ${x + bw/2 - 4} ${h - bh - 10} L ${x + bw/2 + 4} ${h - bh - 10} L ${x + bw/2 + 4} ${h - bh + 6} L ${x + bw - 6} ${h - bh + 6} L ${x + bw} ${h - bh + 14} L ${x + bw} ${h} Z" fill="#0F0828"/>`); features.push(`<circle cx="${x + bw/2}" cy="${h - bh - 14}" r="1.3" fill="#FF3030" class="blink"/>`); }
        else if (t < 0.28) { bw = 32 + Math.random() * 18; bh = 110 + Math.random() * 40; parts.push(`<path d="M ${x} ${h} L ${x} ${h - bh + 6} L ${x + 3} ${h - bh} L ${x + bw - 3} ${h - bh} L ${x + bw} ${h - bh + 6} L ${x + bw} ${h} Z" fill="#0F0828"/>`); }
        else if (t < 0.42) { bw = 14 + Math.random() * 8; bh = 130 + Math.random() * 30; parts.push(`<rect x="${x}" y="${h - bh}" width="${bw}" height="${bh}" fill="#0F0828"/>`); parts.push(`<rect x="${x - 1}" y="${h - bh}" width="${bw + 2}" height="3" fill="#0F0828"/>`); }
        else if (t < 0.6) { bw = 28 + Math.random() * 10; bh = 90 + Math.random() * 35; parts.push(`<rect x="${x}" y="${h - bh}" width="${bw}" height="${bh}" fill="#0F0828"/>`); }
        else { bw = 22 + Math.random() * 12; bh = 80 + Math.random() * 35; parts.push(`<rect x="${x}" y="${h - bh}" width="${bw}" height="${bh}" fill="#0F0828"/>`); }
        const wRows = Math.floor((bh - 8) / 6); const wCols = Math.max(2, Math.floor(bw / 5)); const colSpacing = bw / (wCols + 1);
        for (let r = 0; r < wRows; r++) for (let c = 0; c < wCols; c++) {
          if (Math.random() > 0.45) {
            const wx = x + colSpacing * (c + 1) - 1; const wy = h - bh + 6 + r * 6;
            if (wy < h - 4) {
              const lit = Math.random();
              let color = '#FFD580', op = 0.95;
              if (lit < 0.1) color = '#9FE1FF'; else if (lit < 0.18) color = '#FFB070'; else if (lit > 0.7) { op = 0.4; color = '#5A4830'; }
              if (op > 0.8 && color === '#FFD580') windows.push(`<rect x="${(wx-0.4).toFixed(1)}" y="${(wy-0.4).toFixed(1)}" width="2.8" height="3.3" fill="${color}" opacity="0.18"/>`);
              windows.push(`<rect x="${wx.toFixed(1)}" y="${wy.toFixed(1)}" width="2" height="2.5" fill="${color}" opacity="${op}"/>`);
            }
          }
        }
        x += bw + 1;
      }
      return parts.join('') + windows.join('') + features.join('');
    }
    svg += buildSection(0); svg += buildSection(TOTAL_W); svg += '</svg>';
    layerEl.innerHTML = svg; layerEl.style.width = (TOTAL_W * 2) + 'px'; layerEl._totalW = TOTAL_W;
  }

  function buildFarCity(layerEl) {
    const h = 130;
    let svg = `<svg width="${TOTAL_W * 2}" height="${h}" viewBox="0 0 ${TOTAL_W * 2} ${h}" style="display:block;">`;
    function buildSection(offsetX) {
      let path = `M ${offsetX} ${h}`; let x = offsetX;
      const windows = [], lights = [];
      while (x < offsetX + TOTAL_W) {
        const t = Math.random(); let bw, bh;
        if (t < 0.18) { bw = 14; bh = 115; path += ` L ${x} ${h - bh + 10} L ${x + bw/2} ${h - bh - 6} L ${x + bw} ${h - bh + 10} L ${x + bw} ${h}`; if (Math.random() > 0.3) lights.push(`<circle cx="${x + bw/2}" cy="${h - bh - 4}" r="0.9" fill="#FF4444" class="blink"/>`); }
        else if (t < 0.4) { bw = 22 + Math.random() * 12; bh = 65 + Math.random() * 40; path += ` L ${x} ${h - bh} L ${x + bw} ${h - bh} L ${x + bw} ${h}`; }
        else if (t < 0.6) { bw = 28 + Math.random() * 15; bh = 75 + Math.random() * 35; path += ` L ${x} ${h - bh + 4} L ${x + 4} ${h - bh} L ${x + bw - 4} ${h - bh} L ${x + bw} ${h - bh + 4} L ${x + bw} ${h}`; }
        else { bw = 18 + Math.random() * 10; bh = 55 + Math.random() * 30; path += ` L ${x} ${h - bh} L ${x + bw} ${h - bh} L ${x + bw} ${h}`; }
        const wRows = Math.floor(bh / 7), wCols = Math.floor(bw / 5);
        for (let r = 0; r < wRows; r++) for (let c = 0; c < wCols; c++) {
          if (Math.random() > 0.55) {
            const wx = x + 2 + c * 5 + (Math.random() - 0.5); const wy = h - bh + 4 + r * 7;
            if (wy < h - 3) {
              const op = Math.random() > 0.5 ? 0.95 : 0.5;
              const yellow = Math.random() > 0.15;
              windows.push(`<rect x="${wx.toFixed(1)}" y="${wy.toFixed(1)}" width="1.5" height="2" fill="${yellow ? '#FFD580' : '#FFA8A8'}" opacity="${op}"/>`);
            }
          }
        }
        x += bw;
      }
      path += ` L ${offsetX + TOTAL_W} ${h} Z`;
      return `<path d="${path}" fill="#241845"/>` + windows.join('') + lights.join('');
    }
    svg += buildSection(0); svg += buildSection(TOTAL_W); svg += '</svg>';
    layerEl.innerHTML = svg; layerEl.style.width = (TOTAL_W * 2) + 'px'; layerEl._totalW = TOTAL_W;
  }

  function buildMountains(layerEl) {
    let svg = `<svg width="${TOTAL_W * 2}" height="50" viewBox="0 0 ${TOTAL_W * 2} 50" style="display:block;">`;
    function buildSection(offsetX) {
      let path = `M ${offsetX} 50`; let x = offsetX;
      while (x < offsetX + TOTAL_W) {
        const peakW = 60 + Math.random() * 90;
        const peakH = 22 + Math.random() * 22;
        path += ` L ${x + peakW * 0.3} ${50 - peakH * 0.6} L ${x + peakW * 0.5} ${50 - peakH} L ${x + peakW * 0.7} ${50 - peakH * 0.7} L ${x + peakW} ${50 - peakH * 0.3}`;
        x += peakW;
      }
      path += ` L ${offsetX + TOTAL_W} 50 Z`;
      return `<path d="${path}" fill="#3A2456" opacity="0.55"/>`;
    }
    svg += buildSection(0); svg += buildSection(TOTAL_W); svg += '</svg>';
    layerEl.innerHTML = svg; layerEl.style.width = (TOTAL_W * 2) + 'px'; layerEl._totalW = TOTAL_W;
  }

  function buildRiver(layerEl) {
    let html = '';
    layerEl.style.width = (TOTAL_W * 2) + 'px';
    layerEl._totalW = TOTAL_W;
    for (let loop = 0; loop < 2; loop++) {
      const harborStart = loop * TOTAL_W + 1 * DISTRICT_W;
      const harborEnd = harborStart + DISTRICT_W;
      const harborW = DISTRICT_W;
      html += `<div style="position:absolute; bottom:0; left:${harborStart}px; width:${harborW}px; height:22px; background: linear-gradient(to bottom, #0a0418, #1a0e35);"></div>`;
      for (let i = 0; i < 22; i++) {
        const x = harborStart + Math.random() * harborW;
        const w = 4 + Math.random() * 12;
        const top = 2 + Math.random() * 16;
        const colors = ['rgba(255,213,128,0.4)', 'rgba(255,159,112,0.35)', 'rgba(159,225,255,0.3)'];
        const c = colors[Math.floor(Math.random() * colors.length)];
        const animDelay = Math.random() * 3;
        html += `<div style="position:absolute; bottom:${top}px; left:${x}px; width:${w}px; height:0.8px; background:${c}; animation: shimmer 2.5s infinite ease-in-out; animation-delay:${animDelay}s;"></div>`;
      }
    }
    layerEl.innerHTML = html;
  }

  function buildClouds(layerEl) {
    let svg = `<svg width="${TOTAL_W * 2}" height="200" viewBox="0 0 ${TOTAL_W * 2} 200" style="display:block;">`;
    function cloud(x, y, scale, op) {
      return `<g transform="translate(${x},${y}) scale(${scale})" opacity="${op}">
        <ellipse cx="0" cy="0" rx="22" ry="6" fill="#fff"/>
        <ellipse cx="-10" cy="-3" rx="10" ry="5" fill="#fff"/>
        <ellipse cx="8" cy="-3" rx="12" ry="6" fill="#fff"/>
      </g>`;
    }
    const numClouds = 16;
    for (let i = 0; i < numClouds; i++) {
      const x = (i / numClouds) * TOTAL_W * 2 + Math.random() * 60;
      const y = 30 + Math.random() * 110;
      svg += cloud(x, y, 0.6 + Math.random() * 0.7, 0.15 + Math.random() * 0.25);
    }
    svg += '</svg>';
    layerEl.innerHTML = svg; layerEl.style.width = (TOTAL_W * 2) + 'px'; layerEl._totalW = TOTAL_W;
  }

  function buildPowerLines(layerEl) {
    let svg = `<svg width="${SCREEN_W}" height="50" viewBox="0 0 ${SCREEN_W} 50" style="display:block;">`;
    svg += `<rect x="-2" y="0" width="3" height="50" fill="#0a0418"/>`;
    svg += `<rect x="-6" y="6" width="11" height="1.5" fill="#0a0418"/>`;
    svg += `<rect x="-6" y="14" width="11" height="1.5" fill="#0a0418"/>`;
    svg += `<rect x="-5.5" y="4" width="1.5" height="2.5" fill="#0a0418"/>`;
    svg += `<rect x="3.5" y="4" width="1.5" height="2.5" fill="#0a0418"/>`;
    svg += `<rect x="-5.5" y="12" width="1.5" height="2.5" fill="#0a0418"/>`;
    svg += `<rect x="3.5" y="12" width="1.5" height="2.5" fill="#0a0418"/>`;
    svg += `<path d="M -5 7 Q ${SCREEN_W * 0.5} 18 ${SCREEN_W + 5} 11" stroke="#0a0418" stroke-width="0.8" fill="none" opacity="0.85"/>`;
    svg += `<path d="M 4 7 Q ${SCREEN_W * 0.5} 20 ${SCREEN_W + 5} 13" stroke="#0a0418" stroke-width="0.8" fill="none" opacity="0.85"/>`;
    svg += `<path d="M -5 15 Q ${SCREEN_W * 0.5} 27 ${SCREEN_W + 5} 19" stroke="#0a0418" stroke-width="0.8" fill="none" opacity="0.85"/>`;
    svg += `<path d="M 4 15 Q ${SCREEN_W * 0.5} 29 ${SCREEN_W + 5} 21" stroke="#0a0418" stroke-width="0.8" fill="none" opacity="0.85"/>`;
    svg += `<g transform="translate(${80 + Math.random() * 100}, ${20 + Math.random() * 4})">`;
    svg += `<ellipse cx="0" cy="0" rx="2" ry="1.2" fill="#0a0418"/>`;
    svg += `<circle cx="1.5" cy="-0.5" r="0.8" fill="#0a0418"/>`;
    svg += `<polygon points="2,-0.5 3,0 2,0.3" fill="#0a0418"/>`;
    svg += `<line x1="-0.5" y1="1" x2="-0.5" y2="2.5" stroke="#0a0418" stroke-width="0.4"/>`;
    svg += `<line x1="0.5" y1="1" x2="0.5" y2="2.5" stroke="#0a0418" stroke-width="0.4"/>`;
    svg += `</g>`;
    svg += '</svg>';
    layerEl.innerHTML = svg;
  }

  buildFarCity(document.getElementById('city-far'));
  buildMidCity(document.getElementById('city-mid'));
  buildNearCity(document.getElementById('city-near'));
  buildClouds(document.getElementById('cloud-layer'));
  buildMountains(document.getElementById('mountain-layer'));
  buildRiver(document.getElementById('river-layer'));
  buildPowerLines(document.getElementById('powerline-layer'));

  const starLayer = document.getElementById('stars');
  let starHTML = '';
  for (let i = 0; i < 35; i++) {

      if (p > 1.5) { win.remove(); active.sil = false; return; }
      win.querySelector('#silperson').style.left = (-3 + p * 8) + 'px';
      requestAnimationFrame(tk);
    }
    tk();
  }

  // Kite over uptown
  function kite() {
    if (active.kite) return; active.kite = true;
    const cityX = 4 * DISTRICT_W + 100 + Math.random() * 200; // uptown
    const baseY = 200 + Math.random() * 30;
    const k = document.createElement('div');
    k.style.cssText = `position:absolute; left:${cityX}px; bottom:${baseY}px;`;
    k.innerHTML = `<svg width="20" height="80" viewBox="0 0 20 80" style="overflow:visible;">
      <line x1="10" y1="20" x2="10" y2="80" stroke="#0a0418" stroke-width="0.4" stroke-dasharray="2 1" opacity="0.5"/>
      <polygon points="10,2 16,12 10,24 4,12" fill="#EF4444"/>
      <polygon points="10,2 10,24 4,12" fill="#991B1B" opacity="0.4"/>
      <line x1="10" y1="24" x2="8" y2="34" stroke="#FFD580" stroke-width="0.4"/>
      <circle cx="8.5" cy="29" r="0.6" fill="#FFD580"/>
      <circle cx="7.7" cy="33" r="0.6" fill="#FFD580"/>
      <line x1="10" y1="24" x2="12" y2="36" stroke="#FFD580" stroke-width="0.4"/>
      <circle cx="11" cy="31" r="0.6" fill="#FFD580"/>
    </svg>`;
    rooftopEvents.appendChild(k);
    let t = 0; const dur = 6;
    function tk() {
      t += 0.016;
      if (t > dur) { k.remove(); active.kite = false; return; }
      const fade = t < 0.5 ? t / 0.5 : (t > dur - 0.5 ? (dur - t) / 0.5 : 1);
      const dx = Math.sin(t * 1.5) * 8;
      const dy = -Math.sin(t * 0.4) * 12;
      k.style.opacity = fade;
      k.style.transform = `translate(${dx}px, ${dy}px) rotate(${Math.sin(t * 1.5) * 8}deg)`;
      requestAnimationFrame(tk);
    }
    tk();
  }

  // WATER EVENTS — only in harbor
  function ferry() {
    if (active.ferry) return; active.ferry = true;
    const f = document.createElement('div');
    const dir = Math.random() > 0.5 ? 1 : -1;
    const cityX = 1 * DISTRICT_W; // harbor
    const startCityX = dir > 0 ? cityX - 36 : cityX + DISTRICT_W + 10;
    f.style.cssText = `position:absolute; left:${startCityX}px; bottom:6px; transform:${dir < 0 ? 'scaleX(-1)' : ''};`;
    f.innerHTML = `<svg width="34" height="14" viewBox="0 0 34 14">
      <path d="M2 9 L32 9 L29 13 L5 13 Z" fill="#080419"/>
      <rect x="6" y="3" width="22" height="6" fill="#080419"/>
      <rect x="8" y="5" width="2" height="2" fill="#FFD580"/>
      <rect x="12" y="5" width="2" height="2" fill="#FFD580"/>
      <rect x="16" y="5" width="2" height="2" fill="#FFD580"/>
      <rect x="20" y="5" width="2" height="2" fill="#FFD580"/>
      <rect x="24" y="5" width="2" height="2" fill="#FFD580"/>
      <rect x="14" y="0" width="2" height="3" fill="#080419"/>
      <circle cx="15" cy="0.5" r="0.5" fill="#FF4040" class="blink"/>
      <circle cx="3" cy="11" r="0.5" fill="#FF4040"/>
      <circle cx="31" cy="11" r="0.5" fill="#A8FFB0"/>
    </svg>`;
    waterEvents.appendChild(f);
    let fx = startCityX;
    function tk() {
      fx += 0.18 * dir;
      const wob = Math.sin(performance.now() * 0.003) * 0.6;
      f.style.transform = `translateY(${wob}px) ${dir < 0 ? 'scaleX(-1)' : ''}`;
      f.style.left = fx + 'px';
      if ((dir > 0 && fx > cityX + DISTRICT_W + 36) || (dir < 0 && fx < cityX - 36)) { f.remove(); active.ferry = false; return; }
      requestAnimationFrame(tk);
    }
    tk();
  }

  function smallBoat() {
    if (active.boat) return; active.boat = true;
    const bo = document.createElement('div');
    const dir = Math.random() > 0.5 ? 1 : -1;
    const cityX = 1 * DISTRICT_W;
    const startCityX = dir > 0 ? cityX - 25 : cityX + DISTRICT_W + 10;
    bo.style.cssText = `position:absolute; left:${startCityX}px; bottom:5px; transform:${dir < 0 ? 'scaleX(-1)' : ''};`;
    bo.innerHTML = `<svg width="22" height="14" viewBox="0 0 22 14">
      <path d="M2 11 L20 11 L18 14 L4 14 Z" fill="#0a0418"/>
      <rect x="9" y="4" width="2" height="7" fill="#0a0418"/>
      <polygon points="11,4 11,9 17,9" fill="#0a0418"/>
      <circle cx="6" cy="12.5" r="0.6" fill="#FFD580"/>
      <circle cx="16" cy="12.5" r="0.6" fill="#FFD580"/>
    </svg>`;
    waterEvents.appendChild(bo);
    let bx = startCityX;
    function tk() {
      bx += 0.14 * dir;
      const wob = Math.sin(performance.now() * 0.002) * 0.7;
      bo.style.transform = `translateY(${wob}px) ${dir < 0 ? 'scaleX(-1)' : ''}`;
      bo.style.left = bx + 'px';
      if ((dir > 0 && bx > cityX + DISTRICT_W + 25) || (dir < 0 && bx < cityX - 25)) { bo.remove(); active.boat = false; return; }
      requestAnimationFrame(tk);
    }
    tk();
  }

  // ============ DISTRICT-AWARE EVENT SCHEDULER ============
  // Each event tagged with which districts it can appear in (or sky=any)
  const eventCatalog = [
    // sky events (visible from anywhere)
    { fn: shootingStar, districts: 'sky', weight: 2 },
    { fn: plane, districts: 'sky', weight: 3 },
    { fn: helicopter, districts: 'sky', weight: 2 },
    { fn: blimp, districts: 'sky', weight: 1 },
    { fn: owl, districts: 'sky', weight: 1 },
    { fn: satellite, districts: 'sky', weight: 1 },
    { fn: lightning, districts: 'sky', weight: 1 },
    { fn: fireworks, districts: 'sky', weight: 1 },
    // district-specific
    { fn: cat, districts: [0], weight: 3 },          // downtown
    { fn: silhouette, districts: [0], weight: 2 },    // downtown
    { fn: ferry, districts: [1], weight: 4 },         // harbor
    { fn: smallBoat, districts: [1], weight: 4 },     // harbor
    { fn: train, districts: [2], weight: 4 },         // midtown
    { fn: kite, districts: [4], weight: 3 },          // uptown
  ];

  function scheduleEvent() {
    const delay = 3000 + Math.random() * 5000;
    setTimeout(() => {
      const dist = currentDistrict();
      // Build weighted list of eligible events
      const eligible = [];
      eventCatalog.forEach(ev => {
        if (ev.districts === 'sky' || ev.districts.includes(dist)) {
          for (let w = 0; w < ev.weight; w++) eligible.push(ev.fn);
        }
      });
      if (eligible.length > 0) {
        const fn = eligible[Math.floor(Math.random() * eligible.length)];
        fn();
      }
      scheduleEvent();
    }, delay);
  }
  setTimeout(scheduleEvent, 1500);
  setTimeout(satellite, 2500);

  // === RENDER LOOP ===
  const cityFar = document.getElementById('city-far');
  const cityMid = document.getElementById('city-mid');
  const cityNear = document.getElementById('city-near');
  const cloudLayer = document.getElementById('cloud-layer');
  const mountainLayer = document.getElementById('mountain-layer');
  const riverLayer = document.getElementById('river-layer');
  
  let farOffset = 0, midOffset = 0, nearOffset = 0, cloudOffset = 0, mountainOffset = 0;
  let paused = false;
  let lastT = performance.now();

  function tick(now) {
    const dt = Math.min(now - lastT, 50);
    lastT = now;
    if (!paused) {
      farOffset -= dt * 0.012;
      midOffset -= dt * 0.030;
      nearOffset -= dt * 0.055;
      cloudOffset -= dt * 0.012;
      mountainOffset -= dt * 0.005;
      if (farOffset <= -cityFar._totalW) farOffset += cityFar._totalW;
      if (midOffset <= -cityMid._totalW) midOffset += cityMid._totalW;
      if (nearOffset <= -cityNear._totalW) nearOffset += cityNear._totalW;
      if (cloudOffset <= -cloudLayer._totalW) cloudOffset += cloudLayer._totalW;
      if (mountainOffset <= -mountainLayer._totalW) mountainOffset += mountainLayer._totalW;
      cityFar.style.transform = `translateX(${farOffset.toFixed(1)}px)`;
      cityMid.style.transform = `translateX(${midOffset.toFixed(1)}px)`;
      cityNear.style.transform = `translateX(${nearOffset.toFixed(1)}px)`;
      cloudLayer.style.transform = `translateX(${cloudOffset.toFixed(1)}px)`;
      mountainLayer.style.transform = `translateX(${mountainOffset.toFixed(1)}px)`;
      riverLayer.style.transform = `translateX(${nearOffset.toFixed(1)}px)`;
      rooftopEvents.style.transform = `translateX(${nearOffset.toFixed(1)}px)`;
      waterEvents.style.transform = `translateX(${nearOffset.toFixed(1)}px)`;
      
      FLOCK_CENTERS.forEach(f => {
        f.x += f.speed * dt * 0.05;
        if (f.x > SCREEN_W + 100) {
          f.x = -150;
          f.yBase = 70 + Math.random() * 160;
        }
      });
      balloons.forEach(b => {
        const flock = FLOCK_CENTERS[b.flockIdx];
        const driftX = Math.sin(now * b.driftSpeed + b.driftPhase) * 25;
        const driftY = Math.cos(now * b.driftSpeed + b.driftPhase) * 18;
        b.x = flock.x + b.flockOffsetX + driftX;
        b.y = flock.yBase + b.flockOffsetY + driftY;
        const bob = Math.sin(now * b.bobSpeed + b.bobPhase) * b.bobAmp;
        const sway = Math.sin(now * b.swaySpeed + b.swayPhase) * b.swayAmp;
        b.el.style.transform = `translate(${(b.x + sway).toFixed(1)}px, ${(b.y + bob).toFixed(1)}px) scale(${b.scale})`;
      });
    } else {
      balloons.forEach(b => {
        const bob = Math.sin(now * b.bobSpeed + b.bobPhase) * b.bobAmp * 0.4;
        const sway = Math.sin(now * b.swaySpeed + b.swayPhase) * b.swayAmp * 0.4;
        b.el.style.transform = `translate(${(b.x + sway).toFixed(1)}px, ${(b.y + bob).toFixed(1)}px) scale(${b.scale})`;
      });
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  window.toggleCalm = function() {
    paused = !paused;
    document.getElementById('calm-btn').textContent = paused ? 'resume' : 'pause';
  };

  window.warp = function(districtIdx) {
    const targetCityX = districtIdx * DISTRICT_W + DISTRICT_W / 2;
    nearOffset = -(targetCityX - SCREEN_W / 2);
    midOffset = nearOffset * (0.030 / 0.055);
    farOffset = nearOffset * (0.012 / 0.055);
    mountainOffset = nearOffset * (0.005 / 0.055);
  };

  const themes = [
    { name: 'dusk', sky: 'linear-gradient(to bottom, #1B1235 0%, #3A2456 28%, #6B3866 52%, #B85575 72%, #E89368 88%, #F5B574 100%)', stars: true, celestial: 'moon', haze: 'linear-gradient(to bottom, rgba(184,85,117,0) 0%, rgba(184,85,117,0.15) 70%, rgba(232,147,104,0.22) 100%)' },
    { name: 'night', sky: 'linear-gradient(to bottom, #050314 0%, #0F0A28 40%, #1F1240 75%, #2A1858 100%)', stars: true, celestial: 'moon', haze: 'linear-gradient(to bottom, rgba(31,18,64,0) 0%, rgba(31,18,64,0.2) 70%, rgba(42,24,88,0.3) 100%)' },
    { name: 'dawn', sky: 'linear-gradient(to bottom, #2A2456 0%, #6B4A7A 35%, #D4778A 65%, #F5B080 88%, #FAD49A 100%)', stars: false, celestial: 'sun', haze: 'linear-gradient(to bottom, rgba(212,119,138,0) 0%, rgba(212,119,138,0.15) 70%, rgba(245,176,128,0.25) 100%)' },
    { name: 'noon', sky: 'linear-gradient(to bottom, #4A8FD8 0%, #7FB5E5 50%, #B8D8F0 100%)', stars: false, celestial: 'sun', haze: 'linear-gradient(to bottom, rgba(127,181,229,0) 0%, rgba(127,181,229,0.15) 70%, rgba(184,216,240,0.25) 100%)' },
  ];
  let themeIdx = 0;
  window.cycleTime = function() {
    themeIdx = (themeIdx + 1) % themes.length;
    const t = themes[themeIdx];
    document.getElementById('screen').style.background = t.sky;
    document.getElementById('stars').style.display = t.stars ? 'block' : 'none';
    document.getElementById('haze').style.background = t.haze;
    const cel = document.getElementById('celestial');
    if (t.celestial === 'sun') {
      cel.innerHTML = `<circle cx="22" cy="22" r="14" fill="#FFE5A8"/><circle cx="22" cy="22" r="18" fill="#FFE5A8" opacity="0.3"/><circle cx="22" cy="22" r="22" fill="#FFE5A8" opacity="0.15"/>`;
    } else {
      cel.innerHTML = `<circle cx="22" cy="22" r="18" fill="#FAE8C8"/><circle cx="22" cy="22" r="18" fill="#FAE8C8" opacity="0.3" transform="scale(1.15) translate(-3,-3)"/><circle cx="16" cy="18" r="2.8" fill="#D4B896" opacity="0.6"/><circle cx="27" cy="25" r="1.8" fill="#D4B896" opacity="0.6"/>`;
    }
    document.getElementById('time-btn').textContent = t.name;
  };
})();
</script>
